<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aion2 츄냥이 숙제일기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f9f6f0;
  --surface: #ffffff;
  --surface2: #faf8f5;
  --text: #5a524b;
  --text-sub: #9e9589;
  --border: #eae2d6;
  --hover: #f4efe6;
  --sage: #a3b18a;
  --sage-light: #d4e2c4;
  --peach: #e2b49a;
  --peach-light: #f5ddd0;
  --lavender: #b8aed4;
  --lavender-light: #ddd8ee;
  --sky: #97c4d8;
  --sky-light: #d4eaf4;
  --done: #a3b18a;
  --undone: #faf8f5;
  --shadow: 0 4px 20px rgba(160,150,140,0.10);
  --shadow-sm: 0 2px 8px rgba(160,150,140,0.08);
  --radius: 18px;
  --radius-sm: 10px;
  --radius-xs: 7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Gowun Dodum', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-user-select: none;
  user-select: none;
}

/* ── TOP NAV ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(249,246,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  gap: 12px;
}

.topbar-title {
  font-size: 1rem;
  color: var(--text);
  white-space: nowrap;
}

.topbar-title span {
  color: var(--sage);
}

.tab-pills {
  display: flex;
  gap: 6px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.tab-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab-pill.active {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.realtime-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ccc;
  flex-shrink: 0;
  transition: background 0.3s;
}
.realtime-dot.connected { background: var(--sage); animation: pulse 2s infinite; }
.realtime-dot.error { background: var(--peach); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── PAGES ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── OVERVIEW PAGE ── */
.owner-section { margin-bottom: 20px; }

.owner-label {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.owner-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.chars-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

@media (max-width: 600px) {
  .chars-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── CHARACTER MINI CARD ── */
.char-mini {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.char-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.char-mini.empty { background: var(--surface2); border-style: dashed; cursor: default; opacity: 0.6; }
.char-mini.empty:hover { transform: none; box-shadow: var(--shadow-sm); }

.char-mini-name {
  font-size: 0.85rem;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.char-mini-ilvl {
  font-size: 0.75rem;
  color: var(--text);
  margin-bottom: 6px;
}

.mini-progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mini-dots-daily { display: flex; gap: 3px; }
.mini-dots-weekly { display: flex; gap: 3px; }

.mini-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s;
}

.mini-dot.done { background: var(--sage); }
.mini-dot.done-weekly { background: #d4956a; }
.mini-dot.partial { background: var(--peach); }
.mini-dot.locked { background: var(--border); opacity: 0.4; }

.char-mini-add {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60px;
  color: var(--text-sub);
  font-size: 1.4rem;
}

/* completion bar at bottom of card */
.char-mini-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--sage);
  border-radius: 0 0 0 var(--radius-sm);
  transition: width 0.3s;
}

/* ── ACCOUNT SECTION ── */
.account-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.account-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 12px;
  box-shadow: var(--shadow-sm);
}

.account-card-title {
  font-size: 0.75rem;
  color: var(--text-sub);
  margin-bottom: 6px;
}

.account-card-owner {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 4px;
}

.account-bool-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

/* ── ABYSS SECTION ── */
.abyss-section { margin-bottom: 20px; }

.section-title {
  font-size: 0.85rem;
  color: var(--text-sub);
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.abyss-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.abyss-zone {
  background: var(--sky-light);
  border-radius: var(--radius-xs);
  border: 1px solid var(--sky);
  padding: 8px 6px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.abyss-zone.acquired {
  background: var(--lavender-light);
  border-color: var(--lavender);
}

.abyss-zone-name {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 4px;
}

.abyss-zone-layer {
  font-size: 0.7rem;
  color: var(--text-sub);
  margin-bottom: 6px;
}

.abyss-toggle {
  width: 28px;
  height: 16px;
  border-radius: 8px;
  background: var(--sky);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  margin: 0 auto 4px;
  display: block;
}

.abyss-toggle.on { background: var(--lavender); }

.abyss-toggle::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}

.abyss-toggle.on::after { transform: translateX(12px); }

/* char clear dots under zone */
.abyss-char-dots {
  display: flex;
  gap: 2px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 4px;
}

/* ── DETAIL PAGE ── */
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-sub);
  flex-shrink: 0;
  transition: all 0.2s;
}

.back-btn:hover { background: var(--hover); }

.detail-name-block { flex: 1; }

.detail-char-name {
  font-size: 1.1rem;
  color: var(--text);
}

.detail-char-meta {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-top: 2px;
}

.detail-owner-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
}

.badge-설냥 { background: var(--sage-light); color: #5a7a42; }
.badge-츄츄 { background: var(--peach-light); color: #9a5a3a; }

/* ── CARD SECTIONS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.card-title {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-title-icon {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
}

.icon-daily { background: var(--sky-light); }
.icon-weekly { background: var(--lavender-light); }
.icon-info { background: var(--sage-light); }

/* ── STAT ROW ── */
.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child { border-bottom: none; }

.stat-label {
  font-size: 0.85rem;
  color: var(--text);
  flex: 1;
}

.stat-sublabel {
  font-size: 0.75rem;
  color: var(--text-sub);
  display: block;
}

.stat-inputs {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── NUMBER INPUT ── */
.num-input-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  overflow: hidden;
  background: var(--surface2);
}

.num-btn {
  width: 26px;
  height: 26px;
  background: transparent;
  border: none;
  color: var(--text-sub);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  font-family: 'Gowun Dodum', sans-serif;
}

.num-btn:active { background: var(--hover); }

.num-val {
  min-width: 28px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text);
  padding: 0 2px;
}

.num-val-input {
  width: 48px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text);
  font-family: "Gowun Dodum", sans-serif;
  border: none;
  background: transparent;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
  -moz-appearance: textfield;
  padding: 0 2px;
}
.num-val-input::-webkit-outer-spin-button,
.num-val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num-val-input:focus { background: var(--hover); border-radius: 4px; }

/* ── CP INPUT ── */
.cp-input-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface2);
  overflow: hidden;
  padding-right: 8px;
}
.cp-input {
  border: none !important;
  background: transparent !important;
  width: 76px !important;
  -moz-appearance: textfield;
  -webkit-user-select: text;
  user-select: text;
}
.cp-input::-webkit-outer-spin-button,
.cp-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.cp-input:focus { background: transparent !important; }
.cp-k {
  font-size: 0.85rem;
  color: var(--sage);
  font-weight: bold;
  pointer-events: none;
}

/* ── TOGGLE BUTTON ── */
.toggle-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--undone);
  color: var(--text-sub);
  font-size: 0.8rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.toggle-btn.done {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.toggle-btn.done-peach {
  background: var(--peach);
  color: white;
  border-color: var(--peach);
}

/* ── TEXT INPUT ── */
.text-input {
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  padding: 4px 8px;
  width: 100%;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}

.text-input:focus { border-color: var(--sage); }

/* ── COUNTER DISPLAY ── */
.counter-display {
  font-size: 0.85rem;
  color: var(--text);
}

.counter-max { color: var(--text-sub); font-size: 0.75rem; }

/* ── AWAKENING PIPS ── */
.pip-row {
  display: flex;
  gap: 5px;
}

.pip {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--undone);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: transparent;
}

.pip.done {
  background: var(--lavender);
  border-color: var(--lavender);
  color: white;
}

/* ── NIGHTMARE / KEY WARN ── */
.warn-chip {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  background: #fce8e8;
  color: #b85050;
}

.ok-chip {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  background: var(--sage-light);
  color: #5a7a42;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.85rem;
  transition: transform 0.3s;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── LOADING ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-sub);
  font-size: 0.9rem;
  gap: 8px;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--sage);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SECTION DIVIDER ── */
.section-sep {
  font-size: 0.78rem;
  color: var(--text-sub);
  padding: 4px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-sep::before, .section-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── LOCKED OVERLAY ── */
.locked-row {
  opacity: 0.35;
  pointer-events: none;
}

.lock-badge {
  font-size: 0.7rem;
  color: var(--text-sub);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 8px;
}

/* ── WEEK RESET INFO ── */
/* ── LOG PAGE ── */
.log-date-header {
  font-size: 0.78rem;
  color: var(--text-sub);
  padding: 4px 2px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.log-date-header::after { content:''; flex:1; height:1px; background:var(--border); }

.log-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 10px 14px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-sm);
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.6;
}
.log-time { font-size: 0.68rem; color: var(--text-sub); margin-top: 2px; }
.log-actor-냥이 { color: #c47a8a; }
.log-actor-츄츄 { color: #7a9abf; }
.log-owner-설냥 { color: #5a8a42; }
.log-owner-츄츄 { color: #b06040; }
.log-char { color: var(--lavender); }
.log-action { color: var(--text); }
.log-action-done { color: var(--sage); }

.log-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 14px;
  gap: 12px;
}
.log-nav-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-sub);
  font-size: 0.82rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.log-nav-btn:hover { background: var(--hover); color: var(--text); }
.log-nav-btn:disabled { opacity: 0.3; cursor: default; }
.log-nav-date {
  font-size: 0.85rem;
  color: var(--text);
  text-align: center;
  flex: 1;
}

.reset-info {
  font-size: 0.72rem;
  color: var(--text-sub);
  margin-top: -6px;
  margin-bottom: 8px;
  padding-left: 2px;
}

/* add char form */
.add-char-form {
  display: none;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.add-char-form.open { display: block; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.form-label {
  font-size: 0.78rem;
  color: var(--text-sub);
  margin-bottom: 3px;
}

.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

.btn-primary {
  padding: 7px 18px;
  border-radius: 20px;
  border: none;
  background: var(--sage);
  color: white;
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
}

.btn-cancel {
  padding: 7px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
    <div class="realtime-dot" id="rt-dot" title="실시간 연결"></div>
    <div class="topbar-title">Aion2 <span>츄냥이숙제</span></div>
  </div>
  <div class="tab-pills">
    <button class="tab-pill active" id="tab-overview" onclick="showPage('overview')">전체</button>
    <button class="tab-pill" onclick="showPage('detail-page')" id="detail-tab" style="display:none">상세</button>
    <button class="tab-pill" id="tab-log" onclick="showPage('log-page')">로그</button>
  </div>
  <div id="reset-info" style="text-align:right;flex-shrink:0;line-height:1.5"></div>
</div>

<div id="toast" class="toast"></div>

<!-- ═══════════════════════════════ OVERVIEW PAGE ═══════════════════════════════ -->
<div id="overview" class="page active">
  <div id="overview-content">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</div>

<!-- ═══════════════════════════════ DETAIL PAGE ═══════════════════════════════ -->
<div id="detail-page" class="page">
  <div class="detail-header">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="detail-name-block">
      <div class="detail-char-name" id="detail-char-name">—</div>
      <div class="detail-char-meta" id="detail-char-meta">—</div>
    </div>
    <div class="detail-owner-badge" id="detail-owner-badge"></div>
  </div>
  <div id="detail-content"></div>
</div>

<!-- ── 로그 페이지 ── -->
<div id="log-page" class="page">
  <div id="log-content">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</div>

<!-- ── 사용자 선택 모달 ── -->
<div id="user-modal-overlay" style="
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(90,82,75,0.4);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:20px;
">
  <div style="

// ── UTIL ──
// 게임 기준 "오늘" — KST 05:00 이전이면 전날로 취급
function getTodayKST() {
  const now = new Date();
  // KST = UTC+9
  const kstMs = now.getTime() + 9 * 3600 * 1000;
  const kst = new Date(kstMs);
  // KST 시간이 05:00 미만이면 아직 전날 게임일
  if (kst.getUTCHours() < 5) {
    kst.setUTCDate(kst.getUTCDate() - 1);
  }
  const y = kst.getUTCFullYear();
  const m = String(kst.getUTCMonth() + 1).padStart(2, '0');
  const d = String(kst.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// 게임 기준 "이번 주 시작" — 가장 최근 수요일 KST 05:00 기준
function getWeekStart() {
  const now = new Date();
  const kstMs = now.getTime() + 9 * 3600 * 1000;
  const kst = new Date(kstMs);
  const dow = kst.getUTCDay();   // 0=일 1=월 2=화 3=수 4=목 5=금 6=토
  const hour = kst.getUTCHours(); // KST 시각

  // 가장 최근 수요일(3)까지의 거리
  let diff = (dow - 3 + 7) % 7;
  // 수요일 당일이지만 KST 05:00 미만 → 아직 저번 주
  if (diff === 0 && hour < 5) diff = 7;

  const wed = new Date(kstMs);
  wed.setUTCDate(kst.getUTCDate() - diff);
  // 수요일 KST 날짜를 그대로 UTC 필드로 읽음 (offset이 이미 더해진 상태)
  const y = wed.getUTCFullYear();
  const m = String(wed.getUTCMonth() + 1).padStart(2, '0');
  const d = String(wed.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getLastWarDate() {
  // 화/목/토(2,4,6) 21:00 KST 기준
  const now = new Date();
  const kst = new Date(now.getTime() + 9*3600*1000);
  const warDays = [2,4,6];
  for (let i=0; i<14; i++) {
    const d = new Date(kst);
    d.setUTCDate(kst.getUTCDate() - i);
    const wd = d.getUTCDay();
    if (warDays.includes(wd)) {
      if (i === 0 && kst.getUTCHours() < 21) continue;
      return d.toISOString().slice(0,10);
    }
  }
  return getTodayKST();
}

// 다음 전쟁 시각 (KST) 반환 - UTC Date 객체
function getNextWarTime() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9*3600*1000);
  const warDays = [2,4,6]; // 화/목/토
  // i=0 부터 시작 → 오늘도 체크
  for (let i=0; i<=7; i++) {
    const d = new Date(kst);
    d.setUTCDate(kst.getUTCDate() + i);
    const wd = d.getUTCDay();
    if (warDays.includes(wd)) {
      // KST 21:00 = UTC 12:00 당일
      d.setUTCHours(12, 0, 0, 0);
      // 오늘이지만 이미 21:00 지났으면 스킵
      if (d <= now) continue;
      return d;
    }
  }
  return null;
}

function formatWarDate(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T00:00:00+09:00');
  const m = d.getMonth()+1;
  const day = d.getDate();
  const wd = days[d.getDay()];
  return `${m}/${day} (${wd})`;
}

function getCountdown() {
  const next = getNextWarTime();
  if (!next) return { text: '—', urgent: false };
  const diff = next - new Date();
  if (diff <= 0) return { text: '전쟁 중!', urgent: true };
  const totalMin = Math.floor(diff / 60000);
  const days = Math.floor(totalMin / 1440);
  const hours = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  let text = '';
  if (days > 0) text += `${days}일 `;
  text += `${hours}시간 ${mins}분`;
  const urgent = diff < 12 * 3600 * 1000; // 12시간 미만
  return { text, urgent };
}

function formatResetTime(isoStr) {
  // UTC ISO → KST 표시
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const y = kst.getUTCFullYear();
  const m = kst.getUTCMonth()+1;
  const day = kst.getUTCDate();
  const h = String(kst.getUTCHours()).padStart(2,'0');
  return `${y}년 ${m}월 ${day}일 ${h}시`;
}

function buildMiniDots(char, dt, wt) {
  const ilvl = char.item_level || 0;
  const nm = char.nightmare_base || 0;
  const aw = char.awakening_done || 0;
  const acc = accountData[char.owner] || {};

  // 일일 (왼쪽): 사명, 보급, 악몽
  const daily = [
    `<div class="mini-dot ${dt.mission_done?'done':''}"></div>`,
    `<div class="mini-dot ${dt.supply_done?'done':''}"></div>`,
    `<div class="mini-dot ${nm<=12?'done':'partial'}" title="악몽${nm}"></div>`,
  ].join('');

  // 주간 (오른쪽): 각성, 루드라, 침식, 지령서3
  const weekly = [
    `<div class="mini-dot ${aw>=3?'done-weekly':aw>0?'done-weekly':''}"></div>`,
    ilvl >= 2700
      ? `<div class="mini-dot ${wt.ludra_done?'done-weekly':''}"></div>`
      : `<div class="mini-dot locked"></div>`,
    ilvl >= 3500
      ? `<div class="mini-dot ${wt.erosion_done?'done-weekly':''}"></div>`
      : `<div class="mini-dot locked"></div>`,

  ].join('');

  return `<div class="mini-dots-daily">${daily}</div><div class="mini-dots-weekly">${weekly}</div>`;
}

function calcCompletionPct(char, dt, wt) {
  let done = 0, total = 0;
  const ilvl = char.item_level || 0;
  total += 2; if (dt.mission_done) done++; if (dt.supply_done) done++;
  total += 1; if ((char.nightmare_base||0) <= 12) done++;
  total += 1; if ((char.awakening_done||0) >= 3) done++;
  if (ilvl >= 2700) { total++; if (wt.ludra_done) done++; }
  if (ilvl >= 3500) { total++; if (wt.erosion_done) done++; }

  return total > 0 ? Math.round(done/total*100) : 0;
}

  for (const zone of ZONES) {
    const corridor = abyssCorridors.find(c => c.zone === zone.name);
    const acquired = corridor?.acquired || false;
    const corId = corridor?.id;

    let charDots = '';

    html += `<div class="abyss-zone ${acquired?'acquired':''}">
      <div class="abyss-zone-layer">${zone.layer}</div>
      <div class="abyss-zone-name">${zone.name}</div>

      <div class="abyss-char-dots">${charDots}</div>

  }

  html += `</div></div>`;
  return html;
}

// ── NUM INPUT HELPER ──
function numInput(field, val, charId, min, max) {
  const id = `nv-${charId}-${field}`;
  return `<div class="num-input-wrap">
    <button class="num-btn" onclick="stepCharById('${charId}','${field}','${id}',-1,${min},${max})">−</button>
    <input class="num-val-input" id="${id}" type="number" value="${val}" min="${min}" max="${max}"
      onchange="commitNumInput('${charId}','${field}','${id}',${min},${max})"
      onblur="commitNumInput('${charId}','${field}','${id}',${min},${max})">
    <button class="num-btn" onclick="stepCharById('${charId}','${field}','${id}',1,${min},${max})">+</button>
  </div>`;
}

// +/- 버튼: DOM에서 현재 값 읽어서 증감
function stepCharById(charId, field, inputId, delta, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const cur = parseInt(el.value) || 0;
  const newVal = Math.min(max, Math.max(min, cur + delta));
  el.value = newVal;
  saveNumInput(charId, field, newVal);
}

// 직접 입력 후 포커스 벗어날 때 저장
function commitNumInput(charId, field, inputId, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  let newVal = parseInt(el.value);
  if (isNaN(newVal)) newVal = min;
  newVal = Math.min(max, Math.max(min, newVal));
  el.value = newVal;
  saveNumInput(charId, field, newVal);
}

// ── CP HELPERS ──
// DB 저장값: 소수점 1자리를 정수로 (예: 525.2k → 5252)
function formatCp(stored) {
  if (!stored) return '0k';
  const v = stored / 10;
  return (Number.isInteger(v) ? v.toString() : v.toFixed(1)) + 'k';
}

function validateCpInput(input) {
  // 숫자, 점, 쉼표만 허용 / 소수점 1자리까지
  let val = input.value.replace(',', '.').replace(/[^0-9.]/g, '');
  // 점 두 개 이상 제거
  const parts = val.split('.');
  if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
  // 소수점 이하 1자리까지만
  if (parts.length === 2 && parts[1].length > 1) val = parts[0] + '.' + parts[1].slice(0,1);
  input.value = val;
}

async function commitCpInput(charId, input) {
  let raw = parseFloat(input.value.replace(',', '.'));
  if (isNaN(raw)) raw = 0;
  // 소수점 1자리 강제
  raw = Math.round(raw * 10) / 10;
  input.value = raw;
  const stored = Math.round(raw * 10); // DB 저장값
  const char = allChars.find(c => c.id === charId);
  if (char) {
    char.combat_power = stored;
    document.getElementById('detail-char-meta').textContent =
      `템 ${char.item_level||0} · ${formatCp(stored)}`;
  }
  const { error } = await sb.from('characters').update({combat_power: stored}).eq('id', charId);
  if (error) showToast('저장 실패');
}

async function saveNumInput(charId, field, newVal) {
  const char = allChars.find(c => c.id === charId);
  if (char) char[field] = newVal;
  const { error } = await sb.from('characters').update({[field]: newVal}).eq('id', charId);
  if (error) showToast('저장 실패');
  renderOverview(); // 항상 갱신 (상세뷰에서 수정해도 전체뷰 반영)
}

// ── DB ACTIONS ──
async function updateCharField(charId, field, value) {
  const { error } = await sb.from('characters').update({[field]: value}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) char[field] = value;
  showToast('저장 완료');
}



async function toggleDaily(charId, field, value, today) {
  const existing = dailyTasks[charId];
  let error;
  if (existing) {
    ({ error } = await sb.from('daily_tasks').update({[field]: value}).eq('id', existing.id));
    if (!error) existing[field] = value;
  } else {
    const { data, error: err } = await sb.from('daily_tasks')
      .insert({ character_id: charId, task_date: today, [field]: value })
      .select().single();
    error = err;
    if (!error) dailyTasks[charId] = data;
  }
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    renderDetail(char);
    renderOverview();
    const actionMap = { mission_done:'사명 완료', supply_done:'보급 완료' };
    if (value && actionMap[field]) writeLog(char.owner, char.name, actionMap[field]);
  }
}

async function toggleWeekly(charId, field, value, week) {
  const existing = weeklyTasks[charId];
  let error;
  if (existing) {
    ({ error } = await sb.from('weekly_tasks').update({[field]: value}).eq('id', existing.id));
    if (!error) existing[field] = value;
  } else {
    const { data, error: err } = await sb.from('weekly_tasks')
      .insert({ character_id: charId, week_start: week, [field]: value })
      .select().single();
    error = err;
    if (!error) weeklyTasks[charId] = data;
  }
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    renderDetail(char);
    renderOverview();
    const actionMap = { ludra_done:'성역-루드라 완료', erosion_done:'성역-침식 완료' };
    if (value && actionMap[field]) writeLog(char.owner, char.name, actionMap[field]);
  }
}

async function cycleAwakening(charId, cur, pip) {
  const newVal = cur === pip ? pip - 1 : pip;
  const { error } = await sb.from('characters').update({awakening_done: newVal}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    char.awakening_done = newVal;
    renderDetail(char);
    renderOverview();
    if (newVal > cur) writeLog(char.owner, char.name, `각성 ${newVal}회 완료`);
  }
}

async function toggleAbyss(zoneName, acquired, warDate) {
  const existing = abyssCorridors.find(c => c.zone === zoneName);
  if (existing) {
    const { error } = await sb.from('abyss_corridors').update({acquired}).eq('id', existing.id);
    if (error) { showToast('저장 실패'); return; }
    existing.acquired = acquired;
  } else {
    const zone = ZONES.find(z => z.name === zoneName);
    const { data, error } = await sb.from('abyss_corridors')
      .insert({ war_date: warDate, zone: zoneName, layer: zone?.layer||'', acquired })
      .select().single();
    if (error) { showToast('저장 실패'); return; }
    abyssCorridors.push(data);
  }
  renderOverview();
}

async function toggleAbyssChar(corridorId, charId, cleared) {
  const k = `${corridorId}_${charId}`;
  const existing = abyssClears[k];
  if (existing) {
    const { error } = await sb.from('abyss_clears').update({cleared}).eq('id', existing.id);
    if (error) { showToast('저장 실패'); return; }
    existing.cleared = cleared;
  } else {
    const { data, error } = await sb.from('abyss_clears')
      .insert({ corridor_id: corridorId, character_id: charId, cleared })
      .select().single();
    if (error) { showToast('저장 실패'); return; }
    abyssClears[k] = data;
  }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    renderDetail(char);
    const cor = abyssCorridors.find(c => c.id === corridorId);
    if (cleared && cor) writeLog(char.owner, char.name, `어비스 회랑-${cor.zone} 완료`);
  }
}

      await reloadTable('abyss_corridors');
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'abyss_clears' }, async () => {
      await reloadTable('abyss_clears');
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'activity_log' }, async () => {
      if (document.getElementById('log-page').classList.contains('active')) renderLogPage();
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') dot.classList.add('connected');
      else { dot.classList.remove('connected'); if (status === 'CHANNEL_ERROR') dot.classList.add('error'); }
    });
}

async function reloadTable(table) {
  const today = getTodayKST();
  const week = getWeekStart();
  const warDate = getLastWarDate();

  if (table === 'characters') {
    const { data } = await sb.from('characters').select('*').order('owner').order('slot');
    allChars = data || [];
  } else if (table === 'account_data') {
    const { data } = await sb.from('account_data').select('*');
    accountData = {};
    (data||[]).forEach(a => accountData[a.owner] = a);
  } else if (table === 'daily_tasks') {
    const { data } = await sb.from('daily_tasks').select('*').eq('task_date', today);
    dailyTasks = {};
    (data||[]).forEach(t => dailyTasks[t.character_id] = t);
  } else if (table === 'weekly_tasks') {
    const { data } = await sb.from('weekly_tasks').select('*').eq('week_start', week);
    weeklyTasks = {};
    (data||[]).forEach(t => weeklyTasks[t.character_id] = t);
  } else if (table === 'abyss_corridors') {
    const { data } = await sb.from('abyss_corridors').select('*').eq('war_date', warDate);
    abyssCorridors = data || [];
  } else if (table === 'abyss_clears') {
    const { data } = await sb.from('abyss_clears').select('*, abyss_corridors(war_date)');
    abyssClears = {};
    (data||[]).forEach(c => { abyssClears[`${c.corridor_id}_${c.character_id}`] = c; });
  }

  // re-render current view
  if (document.getElementById('overview').classList.contains('active')) {
    renderOverview();
  } else if (currentCharId) {
    const char = allChars.find(c => c.id === currentCharId);
    if (char) renderDetail(char);
  }
}

// ── ACTOR (누가 쓰는지) ──
let currentActor = localStorage.getItem('aion2_actor') || null;

let _pendingActor = null;

function selectActorName(name) {
  _pendingActor = name;
  document.getElementById('actor-step1').style.display = 'none';
  document.getElementById('actor-step2').style.display = 'block';
  document.getElementById('actor-pin-title').textContent = name;
  document.getElementById('actor-pin-input').value = '';
  document.getElementById('actor-pin-error').textContent = '';
  setTimeout(() => document.getElementById('actor-pin-input').focus(), 100);
}

function backToStep1() {
  _pendingActor = null;
  document.getElementById('actor-step2').style.display = 'none';
  document.getElementById('actor-step1').style.display = 'block';
}

async function confirmPin() {
  const input = document.getElementById('actor-pin-input').value.trim();
  const acc = accountData[_pendingActor];
  if (!acc) { document.getElementById('actor-pin-error').textContent = '계정 정보를 불러오는 중...'; return; }
  if (input !== acc.pin) {
    document.getElementById('actor-pin-error').textContent = '비밀번호가 틀렸어요';
    document.getElementById('actor-pin-input').value = '';
    return;
  }
  setActor(_pendingActor);
}

function setActor(name) {
  currentActor = name;
  localStorage.setItem('aion2_actor', name);
  document.getElementById('user-modal-overlay').style.display = 'none';
  document.getElementById('actor-step2').style.display = 'none';
  document.getElementById('actor-step1').style.display = 'block';
}

function checkActor() {
  if (!currentActor) {
    document.getElementById('user-modal-overlay').style.display = 'flex';
    return false;
  }
  return true;
}

// ── ACTIVITY LOG ──
async function writeLog(owner, characterName, action) {
  if (!checkActor()) return;
  const gameDate = getTodayKST();
  await sb.from('activity_log').insert({
    game_date: gameDate,
    actor: currentActor,
    owner,
    character_name: characterName,
    action,
  });
}

// 로그 페이지 날짜 상태
let logCurrentDate = null;

async function renderLogPage() {
  logCurrentDate = logCurrentDate || getTodayKST();
  const el = document.getElementById('log-content');

  const { data: logs } = await sb.from('activity_log')
    .select('*')
    .eq('game_date', logCurrentDate)
    .order('created_at', { ascending: false });

  const dateLabel = formatLogDate(logCurrentDate);
  const today = getTodayKST();
  const isToday = logCurrentDate === today;

  // 이전/다음 날짜 계산
  const prev = offsetDate(logCurrentDate, -1);
  const next = offsetDate(logCurrentDate, 1);
  const hasNext = logCurrentDate < today;

  let html = `
    <div class="log-nav">
      <button class="log-nav-btn" onclick="changeLogDate('${prev}')">◀ 전날</button>
      <div class="log-nav-date">${dateLabel}${isToday ? ' <span style="font-size:0.72rem;color:var(--sage)">오늘</span>' : ''}</div>
      <button class="log-nav-btn" onclick="changeLogDate('${next}')" ${hasNext?'':'disabled'}>다음날 ▶</button>
    </div>`;

  if (!logs || logs.length === 0) {
    html += `<div style="text-align:center;padding:40px 0;font-size:0.85rem;color:var(--text-sub)">이 날의 활동 기록이 없어요</div>`;
  } else {
    logs.forEach(log => {
      const time = formatLogTime(log.created_at);
      const actorDisplay = log.actor === '설냥' ? '냥이' : '츄츄';
      const actorClass = log.actor === '설냥' ? 'log-actor-냥이' : 'log-actor-츄츄';
      const ownerClass = log.owner === '설냥' ? 'log-owner-설냥' : 'log-owner-츄츄';
      html += `<div class="log-card">
        <span class="${actorClass}">[${actorDisplay}]</span>가 
        <span class="${ownerClass}">[${log.owner}]</span> 계정의 
        <span class="log-char">[${log.character_name || '계정'}]</span>
        <span class="log-action-done"> ${log.action}</span>
        <div class="log-time">${time}</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function changeLogDate(date) {
  logCurrentDate = date;
  renderLogPage();
}

function offsetDate(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}

function formatLogDate(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T12:00:00Z');
  const m = d.getUTCMonth() + 1;
  const day = d.getUTCDate();
  const wd = days[d.getUTCDay()];
  return `${m}월 ${day}일 (${wd})`;
}

function formatLogTime(isoStr) {
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const h = String(kst.getUTCHours()).padStart(2,'0');
  const m = String(kst.getUTCMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

// ── ODD ENERGY ESTIMATE ──
let _oddTimers = {};

function formatKST(isoStr) {
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const m = kst.getUTCMonth()+1;
  const day = kst.getUTCDate();
  const h = String(kst.getUTCHours()).padStart(2,'0');
  const min = String(kst.getUTCMinutes()).padStart(2,'0');
  return `${m}/${day} ${h}:${min}`;
}

// KST 05:00 기준 충전 스케줄 - 3시간마다
// 05:00, 08:00, 11:00, 14:00, 17:00, 20:00, 23:00, 02:00
function calcOddEstimate(charId) {
  const char = allChars.find(c => c.id === charId);
  if (!char || !char.odd_recorded_at) return null;

  const recorded = new Date(char.odd_recorded_at);
  const now = new Date();
  const baseVal = char.odd_energy_base || 0;

  // KST 05:00을 기준으로 3시간 간격 충전 시각 계산
  // 기록 시각 이후 몇 번 충전됐는지 계산
  function getChargeSlot(date) {
    // KST 기준 당일 05:00 UTC
    const kst = new Date(date.getTime() + 9*3600*1000);
    const kstHour = kst.getUTCHours();
    const kstMin = kst.getUTCMinutes();
    // 오늘 05:00 KST = UTC 전날 20:00
    const todayBase = new Date(date);
    todayBase.setUTCHours(20, 0, 0, 0); // KST 05:00 = UTC 20:00
    if (kstHour < 5) todayBase.setUTCDate(todayBase.getUTCDate() - 1);
    // todayBase 기준으로 몇 번째 3시간 슬롯인지
    const msSinceBase = date - todayBase;
    return Math.floor(msSinceBase / (3*3600*1000));
  }

  // 기록 시각의 슬롯
  const recordedSlot = getChargeSlot(recorded);
  // 현재 시각의 슬롯
  const nowSlot = getChargeSlot(now);

  // 기록 시각 이후 경과한 전체 슬롯 수
  // 날짜 차이도 고려 (하루 8슬롯)
  const recordedKST = new Date(recorded.getTime() + 9*3600*1000);
  const nowKST = new Date(now.getTime() + 9*3600*1000);

  // 기록 이후 경과 ms
  const elapsedMs = now - recorded;
  // 3시간 단위로 몇 번 충전됐는지
  const chargeCount = Math.floor(elapsedMs / (3*3600*1000));

  const estimated = Math.min(840, baseVal + chargeCount * 15);
  return estimated;
}

function updateOddEstimateUI(charId) {
  const estimated = calcOddEstimate(charId);
  if (estimated === null) return;
  const el = document.getElementById(`odd-estimate-${charId}`);
  if (el) el.textContent = estimated;
}

function startOddTimer(charId) {
  // 기존 타이머 제거
  if (_oddTimers[charId]) clearInterval(_oddTimers[charId]);
  // 즉시 한번 + 3시간마다 갱신
  updateOddEstimateUI(charId);
  _oddTimers[charId] = setInterval(() => updateOddEstimateUI(charId), 3*3600*1000);
}

async function recordOddNow(charId) {
  const now = new Date().toISOString();
  const { error } = await sb.from('characters').update({odd_recorded_at: now}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) char.odd_recorded_at = now;
  // UI 갱신
  const recEl = document.getElementById(`odd-recorded-${charId}`);
  if (recEl) recEl.textContent = formatKST(now) + ' 기록 기준';
  startOddTimer(charId);
  showToast('기록 완료!');
}

async function applyOddEstimate(charId) {
  const estimated = calcOddEstimate(charId);
  if (estimated === null) return;
  // 기본량 입력칸에 적용
  const inputEl = document.getElementById(`nv-${charId}-odd_energy_base`);
  if (inputEl) inputEl.value = estimated;
  // 저장
  const now = new Date().toISOString();
  const { error } = await sb.from('characters')
    .update({ odd_energy_base: estimated, odd_recorded_at: now })
    .eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) { char.odd_energy_base = estimated; char.odd_recorded_at = now; }
  const recEl = document.getElementById(`odd-recorded-${charId}`);
  if (recEl) recEl.textContent = formatKST(now) + ' 기록 기준';
  startOddTimer(charId);
  renderOverview();
  showToast(`오드 ${estimated} 적용!`);
}
