<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aion2 츄냥이 숙제일기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f9f6f0;
  --surface: #ffffff;
  --surface2: #faf8f5;
  --text: #5a524b;
  --text-sub: #9e9589;
  --border: #eae2d6;
  --hover: #f4efe6;
  --sage: #a3b18a;
  --sage-light: #d4e2c4;
  --peach: #e2b49a;
  --peach-light: #f5ddd0;
  --lavender: #b8aed4;
  --lavender-light: #ddd8ee;
  --sky: #97c4d8;
  --sky-light: #d4eaf4;
  --done: #a3b18a;
  --undone: #faf8f5;
  --shadow: 0 4px 20px rgba(160,150,140,0.10);
  --shadow-sm: 0 2px 8px rgba(160,150,140,0.08);
  --radius: 18px;
  --radius-sm: 10px;
  --radius-xs: 7px;

  
  --odd-empty: #ede6d8;
  --odd-low:   #d4e2c4;
  --odd-mid:   #a3b18a;
  --odd-full:  #c47a8a;
  --owner-설냥: #c47a8a;  
  --owner-츄츄: #7a9abf;  
  --shadow-inset: inset 0 1px 2px rgba(160,150,140,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Gowun Dodum', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-user-select: none;
  user-select: none;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(249,246,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  gap: 12px;
}

.topbar-title {
  font-size: 1rem;
  color: var(--text);
  white-space: nowrap;
}

.topbar-title span {
  color: var(--sage);
}

.tab-pills {
  display: flex;
  gap: 6px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.tab-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab-pill.active {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.realtime-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ccc;
  flex-shrink: 0;
  transition: background 0.3s;
}
.realtime-dot.connected { background: #6b9841; animation: pulse 2s infinite; }
.realtime-dot.error { background: #d66a4a; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.page { display: none; padding: 16px; }
#detail-page { padding-top: 0; }
.page.active { display: block; }

.owner-section { margin-bottom: 20px; }

.owner-label {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.owner-divider {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.growth-range-tabs {
  display: flex;
  gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px;
}
.growth-range-btn {
  border: none;
  background: transparent;
  padding: 3px 8px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text-sub);
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 0.68rem;
  white-space: nowrap;
}
.growth-range-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.growth-legend {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-bottom: 10px;
  font-size: 0.72rem;
  color: var(--text-sub);
}
.growth-legend label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  user-select: none;
}
.growth-legend input { margin: 0; cursor: pointer; }
.growth-dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
}
#growth-chart-wrap {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 10px;
  overflow: hidden;
}
#growth-chart { font-family: 'Gowun Dodum', sans-serif; }
.growth-line {
  fill: none;
  stroke-width: 2;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.growth-point { stroke-width: 1.5; }
.growth-axis-label {
  font-size: 10px;
  fill: var(--text-sub);
}
.growth-grid {
  stroke: var(--border);
  stroke-width: 1;
  stroke-dasharray: 2 3;
  opacity: 0.6;
}

.odd-batch-btn {
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid var(--peach);
  background: var(--peach);
  color: white;
  cursor: pointer;
  font-family: 'Gowun Dodum', sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.odd-batch-btn:hover {
  background: #d6a487;
  border-color: #d6a487;
}
body.guest-mode .odd-batch-btn { display: none; }

.chars-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

@media (max-width: 600px) {
  .chars-grid { grid-template-columns: repeat(2, 1fr); }
}

.char-mini {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.char-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.char-mini.empty { background: var(--surface2); border-style: dashed; cursor: default; opacity: 0.6; }
.char-mini.empty:hover { transform: none; box-shadow: var(--shadow-sm); }
.char-mini.resting {
  opacity: 0.45;
  filter: grayscale(0.6);
  background: var(--surface2);
}
.char-mini.resting:hover {
  opacity: 0.7;
  transform: translateY(-1px);
}
.char-mini-resting-badge {
  position: absolute;
  top: 6px; right: 6px;
  font-size: 0.6rem;
  color: var(--text-sub);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 8px;
  line-height: 1.3;
}

.char-mini-name {
  font-size: 0.85rem;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.char-mini-ilvl {
  font-size: 0.75rem;
  color: var(--text);
  margin-bottom: 6px;
}

.mini-progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mini-dots-daily { display: flex; gap: 3px; }
.mini-dots-weekly { display: flex; gap: 3px; }

.mini-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s;
}

.mini-dot.done { background: var(--sage); }
.mini-dot.done-weekly { background: #7aa3c8; }    
.mini-dot.done-cor-설냥 { background: #c47a8a; }  
.mini-dot.done-cor-츄츄 { background: #7a9abf; }  
.mini-dot.partial { background: #d66a4a; }        
.mini-dot.locked { background: var(--border); opacity: 0.4; }

.char-mini-add {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60px;
  color: var(--text-sub);
  font-size: 1.4rem;
}

.char-mini.drag-over {
  border: 2px dashed var(--sage);
  background: var(--sage-light);
  transform: none;
}
.char-mini.dragging {
  opacity: 0.4;
}

.char-mini-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--sage);
  border-radius: 0 0 0 var(--radius-sm);
  transition: width 0.3s;
}

.account-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.account-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 12px;
  box-shadow: var(--shadow-sm);
}

.account-card-title {
  font-size: 0.75rem;
  color: var(--text-sub);
  margin-bottom: 6px;
}

.account-card-owner {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 4px;
}

.account-bool-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.abyss-section { margin-bottom: 20px; }

.section-title {
  font-size: 0.85rem;
  color: var(--text-sub);
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.abyss-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.abyss-view-toggle {
  display: inline-flex;
  gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2px;
  font-size: 0.7rem;
  margin-left: 8px;
}
.abyss-view-toggle button {
  border: none;
  background: transparent;
  padding: 3px 10px;
  border-radius: 12px;
  cursor: pointer;
  color: var(--text-sub);
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 0.7rem;
  white-space: nowrap;
}
.abyss-view-toggle button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.abyss-matrix {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 2px 0;
}
.abyss-matrix-header {
  display: grid;
  gap: 3px;
  padding: 0 4px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  font-size: 0.62rem;
  color: var(--text-sub);
}
.abyss-matrix-header-cell {
  text-align: center;
  line-height: 1.2;
  padding: 2px 0;
}
.abyss-matrix-header-cell-layer {
  display: block;
  font-size: 0.55rem;
  opacity: 0.7;
  margin-top: 1px;
}
.abyss-matrix-row {
  display: grid;
  gap: 3px;
  padding: 4px;
  border-radius: var(--radius-xs);
  align-items: center;
  transition: background 0.15s;
}
.abyss-matrix-row:hover { background: var(--hover); cursor: pointer; }
.abyss-matrix-row.all-done { background: var(--sage-light); }
.abyss-matrix-name {
  font-size: 0.76rem;
  color: var(--text);
  padding-left: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.abyss-matrix-row.all-done .abyss-matrix-name { color: #5a7a42; }
.abyss-matrix-owner-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.abyss-matrix-cell {
  height: 22px;
  border-radius: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.15s;
}
.abyss-matrix-cell.done {
  background: var(--sage);
  border-color: var(--sage);
  color: white;
}
.abyss-matrix-cell.locked {
  opacity: 0.25;
  border-style: dashed;
  cursor: not-allowed;
}
.abyss-matrix-empty {
  text-align: center;
  padding: 20px;
  color: var(--text-sub);
  font-size: 0.8rem;
}

.abyss-zone {
  background: var(--sky-light);
  border-radius: var(--radius-xs);
  border: 1px solid var(--sky);
  padding: 8px 6px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.abyss-zone.acquired {
  background: var(--lavender-light);
  border-color: var(--lavender);
}

.abyss-zone-name {
  font-size: 0.8rem;
  color: var(--text);
  margin-bottom: 4px;
}

.abyss-zone-layer {
  font-size: 0.7rem;
  color: var(--text-sub);
  margin-bottom: 6px;
}

.abyss-toggle {
  width: 28px;
  height: 16px;
  border-radius: 8px;
  background: var(--sky);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  margin: 0 auto 4px;
  display: block;
}

.abyss-toggle.on { background: var(--lavender); }

.abyss-toggle::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}

.abyss-toggle.on::after { transform: translateX(12px); }

.abyss-char-dots {
  display: flex;
  gap: 2px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 4px;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-sub);
  flex-shrink: 0;
  transition: all 0.2s;
}

.back-btn:hover { background: var(--hover); }

.detail-name-block { flex: 1; }

.detail-char-name {
  font-size: 1.1rem;
  color: var(--text);
}

.detail-char-meta {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-top: 2px;
}

.detail-owner-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
}

.badge-설냥 { background: var(--sage-light); color: #5a7a42; }
.badge-츄츄 { background: var(--peach-light); color: #9a5a3a; }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.card-title {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-title-icon {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
}

.icon-daily { background: var(--sky-light); }
.icon-weekly { background: var(--lavender-light); }
.icon-info { background: var(--sage-light); }

.stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child { border-bottom: none; }

.stat-label {
  font-size: 0.85rem;
  color: var(--text);
  flex: 1;
}

.stat-sublabel {
  font-size: 0.75rem;
  color: var(--text-sub);
  display: block;
}

.stat-inputs {
  display: flex;
  align-items: center;
  gap: 6px;
}

.num-input-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  overflow: hidden;
  background: var(--surface2);
}

.num-btn {
  width: 26px;
  height: 26px;
  background: transparent;
  border: none;
  color: var(--text-sub);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  font-family: 'Gowun Dodum', sans-serif;
}

.num-btn:active { background: var(--hover); }

.num-val {
  min-width: 28px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text);
  padding: 0 2px;
}

.num-val-input {
  width: 48px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text);
  font-family: "Gowun Dodum", sans-serif;
  border: none;
  background: transparent;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
  -moz-appearance: textfield;
  padding: 0 2px;
}
.num-val-input::-webkit-outer-spin-button,
.num-val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num-val-input:focus { background: var(--hover); border-radius: 4px; }

#acc-modal .num-btn { width: 22px; height: 22px; font-size: 0.9rem; }
#acc-modal .num-val-input { flex: 1; min-width: 0; width: auto; font-size: 0.78rem; }
#acc-modal .num-input-wrap { width: 100%; justify-content: center; }

.cp-input-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface2);
  overflow: hidden;
  padding-right: 8px;
}
.cp-input {
  border: none !important;
  background: transparent !important;
  width: 76px !important;
  -moz-appearance: textfield;
  -webkit-user-select: text;
  user-select: text;
}
.cp-input::-webkit-outer-spin-button,
.cp-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.cp-input:focus { background: transparent !important; }
.cp-k {
  font-size: 0.85rem;
  color: var(--sage);
  font-weight: bold;
  pointer-events: none;
}

.toggle-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--undone);
  color: var(--text-sub);
  font-size: 0.8rem;
  font-family: 'Gowun Dodum', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.toggle-btn.done {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.toggle-btn.done-peach {
  background: var(--peach);
  color: white;
  border-color: var(--peach);
}

.text-input {
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.85rem;
  font-family: 'Gowun Dodum', sans-serif;
  padding: 4px 8px;
  width: 100%;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}

.text-input:focus { border-color: var(--sage); }

.counter-display {
  font-size: 0.85rem;
  color: var(--text);
}

.counter-max { color: var(--text-sub); font-size: 0.75rem; }

.pip-row {
  display: flex;
  gap: 5px;
}

.pip {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--undone);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: transparent;
}

.pip.done {
  background: var(--lavender);
  border-color: var(--lavender);
  color: white;
}

.warn-chip {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  background: #fce8e8;
  color: #b85050;
}

.ok-chip {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  background: var(--sage-light);
  color: #5a7a42;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.85rem;
  transition: transform 0.3s;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-sub);
  font-size: 0.9rem;
  gap: 8px;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--sage);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.section-sep {
  font-size: 0.78rem;
  color: var(--text-sub);
  padding: 4px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-sep::before, .section-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.locked-row {
  opacity: 0.35;
  pointer-events: none;
}

.lock-badge {
  font-size: 0.7rem;
  color: var(--text-sub);
  background: var(--border);

function getTodayKST() {
  const now = new Date();

  const kstMs = now.getTime() + 9 * 3600 * 1000;
  const kst = new Date(kstMs);

  if (kst.getUTCHours() < 5) {
    kst.setUTCDate(kst.getUTCDate() - 1);
  }
  const y = kst.getUTCFullYear();
  const m = String(kst.getUTCMonth() + 1).padStart(2, '0');
  const d = String(kst.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// 성장 로그 전용: 5시 보정 없이 KST 달력 날짜 그대로 반환 (자정 0시 기준)
function getTodayKST_Calendar() {
  const now = new Date();
  const kstMs = now.getTime() + 9 * 3600 * 1000;
  const kst = new Date(kstMs);
  const y = kst.getUTCFullYear();
  const m = String(kst.getUTCMonth() + 1).padStart(2, '0');
  const d = String(kst.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getWeekStart() {
  const now = new Date();
  const kstMs = now.getTime() + 9 * 3600 * 1000;
  const kst = new Date(kstMs);
  const dow = kst.getUTCDay();   
  const hour = kst.getUTCHours(); 

  
  let diff = (dow - 3 + 7) % 7;
  
  if (diff === 0 && hour < 5) diff = 7;

  const wed = new Date(kstMs);
  wed.setUTCDate(kst.getUTCDate() - diff);
  
  const y = wed.getUTCFullYear();
  const m = String(wed.getUTCMonth() + 1).padStart(2, '0');
  const d = String(wed.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getLastWarDate() {
  
  const now = new Date();
  const kst = new Date(now.getTime() + 9*3600*1000);
  const warDays = [2,4,6];
  for (let i=0; i<14; i++) {
    const d = new Date(kst);
    d.setUTCDate(kst.getUTCDate() - i);
    const wd = d.getUTCDay();
    if (warDays.includes(wd)) {
      if (i === 0 && kst.getUTCHours() < 21) continue;
      return d.toISOString().slice(0,10);
    }
  }
  return getTodayKST();
}

function getNextWarTime() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9*3600*1000);
  const warDays = [2,4,6]; 
  
  for (let i=0; i<=7; i++) {
    const d = new Date(kst);
    d.setUTCDate(kst.getUTCDate() + i);
    const wd = d.getUTCDay();
    if (warDays.includes(wd)) {
      
      d.setUTCHours(12, 0, 0, 0);
      
      if (d <= now) continue;
      return d;
    }
  }
  return null;
}

function formatWarDate(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T00:00:00+09:00');
  const m = d.getMonth()+1;
  const day = d.getDate();
  const wd = days[d.getDay()];
  return `${m}/${day} (${wd})`;
}

function getCountdown() {
  const next = getNextWarTime();
  if (!next) return { text: '—', urgent: false };
  const diff = next - new Date();
  if (diff <= 0) return { text: '전쟁 중!', urgent: true };
  const totalMin = Math.floor(diff / 60000);
  const days = Math.floor(totalMin / 1440);
  const hours = Math.floor((totalMin % 1440) / 60);
  const mins = totalMin % 60;
  let text = '';
  if (days > 0) text += `${days}일 `;
  text += `${hours}시간 ${mins}분`;
  const urgent = diff < 12 * 3600 * 1000; 
  return { text, urgent };
}

function formatResetTime(isoStr) {
  
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const y = kst.getUTCFullYear();
  const m = kst.getUTCMonth()+1;
  const day = kst.getUTCDate();
  const h = String(kst.getUTCHours()).padStart(2,'0');
  return `${y}년 ${m}월 ${day}일 ${h}시`;
}

async function renderResetInfo() {
  const el = document.getElementById('reset-info');
  if (!el) return;

  const { data } = await sb.from('reset_log')
    .select('reset_type, executed_at')
    .order('executed_at', { ascending: false })

  const daily = (data||[]).find(r => r.reset_type === 'daily');
  const weekly = (data||[]).find(r => r.reset_type === 'weekly');

  const dailyStr = daily ? formatResetTime(daily.executed_at) : '—';
  const weeklyStr = weekly ? formatResetTime(weekly.executed_at) : '—';

  el.innerHTML = `

    <div style="font-size:0.65rem;color:var(--text-sub)">마지막 주간 리셋 : ${weeklyStr}</div>
  `;
}

    { id: 'acc-modal-overlay',          close: () => window.closeAccountModal       && window.closeAccountModal() },
    { id: 'odd-batch-detail-overlay',   close: () => window.closeOddBatchDetailModal && window.closeOddBatchDetailModal() },
    { id: 'odd-batch-overlay',          close: () => window.closeOddBatchModal      && window.closeOddBatchModal() },
    { id: 'log-delete-overlay',         close: () => window.closeLogDeleteModal     && window.closeLogDeleteModal() },
    { id: 'vsw-overlay',                close: () => window.vswClose                && window.vswClose() },
  ];
  for (const m of closableModals) {
    const el = document.getElementById(m.id);
    if (isElementVisible(el)) {
      m.close();
      e.preventDefault();
      return;
    }
  }


  const userModal = document.getElementById('user-modal-overlay');
  if (isElementVisible(userModal)) return;


  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    active.blur();
    e.preventDefault();
    return;
  }


  const detailPage = document.getElementById('detail-page');
  if (detailPage && detailPage.classList.contains('active')) {
    goBack();
    e.preventDefault();
  }
});

async function loadAll() {
  const today = getTodayKST();
  const week = getWeekStart();
  const warDate = getLastWarDate();

  const [charsRes, accountRes, dailyRes, weeklyRes, corridorRes, clearsRes, supplyRes] = await Promise.all([
    sb.from('characters').select('*').order('owner').order('slot'),
    sb.from('account_data').select('*'),
    sb.from('daily_tasks').select('*').eq('task_date', today),
    sb.from('weekly_tasks').select('*').eq('week_start', week),
    sb.from('abyss_corridors').select('*').eq('war_date', warDate),
    sb.from('abyss_clears').select('*, abyss_corridors(war_date)'),
    sb.from('expedition_supply').select('dungeon_key'),
  ]);

  allChars = charsRes.data || [];
  accountData = {};
  (accountRes.data || []).forEach(a => accountData[a.owner] = a);
  dailyTasks = {};
  (dailyRes.data || []).forEach(t => dailyTasks[t.character_id] = t);
  weeklyTasks = {};
  (weeklyRes.data || []).forEach(t => weeklyTasks[t.character_id] = t);
  abyssCorridors = corridorRes.data || [];
  abyssClears = {};
  (clearsRes.data || []).forEach(c => {
    const k = `${c.corridor_id}_${c.character_id}`;
    abyssClears[k] = c;
  });
  _expChecked = new Set((supplyRes.data || []).map(r => r.dungeon_key));
  
  if (_expPartyTarget.size === 0 && _expChecked.size > 0) {
    _expPartyTarget.add([..._expChecked][0]);
  }
}

function buildMiniDots(char, dt, wt) {
  const ilvl = char.item_level || 0;
  const nm = char.nightmare_base || 0;
  const aw = char.awakening_done || 0;
  const acc = accountData[char.owner] || {};

  
  const daily = [
    `<div class="mini-dot ${dt.mission_done?'done':''}" title="사명${dt.mission_done?' (완료)':''}"></div>`,
    `<div class="mini-dot ${dt.supply_done?'done':''}" title="보급${dt.supply_done?' (완료)':''}"></div>`,
    `<div class="mini-dot ${nm<=12?'done':'partial'}" title="악몽 ${nm}장${nm>12?' (주의)':''}"></div>`,
  ].join('');

  
  const weeklyDots = [];
  
  weeklyDots.push(`<div class="mini-dot ${aw>=3?'done-weekly':''}" title="각성 ${aw}/3"></div>`);
  
  if (ilvl >= 2700) {
    weeklyDots.push(`<div class="mini-dot ${wt.ludra_done?'done-weekly':''}" title="성역 - 루드라${wt.ludra_done?' (완료)':''}"></div>`);
  }
  
  if (ilvl >= 3500) {
    weeklyDots.push(`<div class="mini-dot ${wt.erosion_done?'done-weekly':''}" title="성역 - 침식${wt.erosion_done?' (완료)':''}"></div>`);
  }
  const weekly = weeklyDots.join('');

  return `<div class="mini-dots-daily">${daily}</div><div class="mini-dots-weekly">${weekly}</div>`;
}

function calcCompletionPct(char, dt, wt) {
  let done = 0, total = 0;
  const ilvl = char.item_level || 0;
  total += 2; if (dt.mission_done) done++; if (dt.supply_done) done++;
  total += 1; if ((char.nightmare_base||0) <= 12) done++;
  total += 1; if ((char.awakening_done||0) >= 3) done++;
  if (ilvl >= 2700) { total++; if (wt.ludra_done) done++; }
  if (ilvl >= 3500) { total++; if (wt.erosion_done) done++; }

  return total > 0 ? Math.round(done/total*100) : 0;
}

function renderAbyssZoneGrid(warDate) {
  let html = `<div class="abyss-grid">`;
  for (const zone of ZONES) {
    const corridor = abyssCorridors.find(c => c.zone === zone.name);
    const acquired = corridor?.acquired || false;
    const corId = corridor?.id;

    let charDots = '';
    if (acquired && corId) {
      allChars.forEach(char => {
        const ilvl = char.item_level || 0;
        const ilvlReq = zone.layer === '하층' ? 1000 : zone.layer === '중층' ? 3000 : 0;
        if (ilvl < ilvlReq) return;
        const k = `${corId}_${char.id}`;
        const cleared = abyssClears[k]?.cleared || false;
        const doneClass = cleared
          ? (char.owner === '설냥' ? 'done-cor-설냥' : 'done-cor-츄츄')
          : '';
        charDots += `<div class="mini-dot ${doneClass}" title="${char.owner} ${char.name||''}"></div>`;
      });
    }

    html += `<div class="abyss-zone ${acquired?'acquired':''}">

      <div class="abyss-zone-name">${zone.name}</div>
      <div class="abyss-toggle ${acquired?'on':''}" onclick="toggleAbyss('${zone.name}', ${!acquired}, '${warDate}')"></div>
      <div class="abyss-char-dots">${charDots}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderAbyssCharMatrix(acquiredZones, warDate) {
  if (acquiredZones.length === 0) {
    return `<div class="abyss-matrix-empty">획득된 회랑이 없어요</div>`;
  }

  
  const hasLower = acquiredZones.some(z => z.layer === '하층');
  const hasMiddle = acquiredZones.some(z => z.layer === '중층');
  const eligibleChars = allChars.filter(c => {
    if (c.resting) return false;
    if (!c.name) return false;
    const ilvl = c.item_level || 0;
    if (hasLower && ilvl >= 1000) return true;
    if (hasMiddle && ilvl >= 3000) return true;
    return false;
  });

  if (eligibleChars.length === 0) {
    return `<div class="abyss-matrix-empty">입장 가능한 캐릭이 없어요</div>`;
  }

  
  eligibleChars.sort((a, b) => {
    if (a.owner !== b.owner) return a.owner === '설냥' ? -1 : 1;
    return (a.slot || 0) - (b.slot || 0);
  });

  
  const gridCols = `minmax(80px, 1.4fr) ${acquiredZones.map(() => 'minmax(36px, 1fr)').join(' ')}`;

  
  let html = `<div class="abyss-matrix">`;
  html += `<div class="abyss-matrix-header" style="grid-template-columns:${gridCols}">`;
  html += `<div class="abyss-matrix-header-cell" style="text-align:left;padding-left:4px">캐릭</div>`;
  acquiredZones.forEach(z => {
    html += `<div class="abyss-matrix-header-cell">${z.name}<span class="abyss-matrix-header-cell-layer">${z.layer}</span></div>`;
  });
  html += `</div>`;

  
  eligibleChars.forEach(char => {
    const ilvl = char.item_level || 0;
    let eligibleZoneCount = 0;
    let clearedCount = 0;
    const cells = acquiredZones.map(zone => {
      const ilvlReq = zone.layer === '하층' ? 1000 : 3000;
      if (ilvl < ilvlReq) {
        return `<div class="abyss-matrix-cell locked" title="${zone.name} 입장 불가 (템 ${ilvlReq}↑)"></div>`;
      }
      eligibleZoneCount++;
      const corridor = abyssCorridors.find(c => c.zone === zone.name);
      const corId = corridor?.id;
      const k = corId ? `${corId}_${char.id}` : null;
      const cleared = k ? (abyssClears[k]?.cleared || false) : false;
      if (cleared) clearedCount++;
      return `<div class="abyss-matrix-cell ${cleared?'done':''}"
        onclick="event.stopPropagation();toggleAbyssCharMatrix('${corId}','${char.id}',${!cleared})"
        title="${zone.name}${cleared?' (완료)':''}">${cleared?'✓':''}</div>`;
    }).join('');

    const allDone = eligibleZoneCount > 0 && clearedCount === eligibleZoneCount;
    html += `<div class="abyss-matrix-row ${allDone?'all-done':''}" style="grid-template-columns:${gridCols}"
      onclick="openDetail('${char.id}')">
      <div class="abyss-matrix-name">
        <span class="abyss-matrix-owner-dot" style="background:var(--owner-${char.owner})"></span>${char.name}
      </div>
      ${cells}
    </div>`;
  });

  html += `</div>`;
  return html;
}

function numInput(field, val, charId, min, max) {
  const id = `nv-${charId}-${field}`;
  return `<div class="num-input-wrap">
    <button class="num-btn" onclick="stepCharById('${charId}','${field}','${id}',-1,${min},${max})">−</button>
    <input class="num-val-input" id="${id}" name="${id}" type="number" value="${val}" min="${min}" max="${max}"
      autocomplete="off" data-lpignore="true" data-form-type="other" data-1p-ignore="true"
      onchange="commitNumInput('${charId}','${field}','${id}',${min},${max})"
      onblur="commitNumInput('${charId}','${field}','${id}',${min},${max})">
    <button class="num-btn" onclick="stepCharById('${charId}','${field}','${id}',1,${min},${max})">+</button>
  </div>`;
}

function stepCharById(charId, field, inputId, delta, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const cur = parseInt(el.value) || 0;
  const newVal = Math.min(max, Math.max(min, cur + delta));
  el.value = newVal;
  saveNumInput(charId, field, newVal);
}

function commitNumInput(charId, field, inputId, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  let newVal = parseInt(el.value);
  if (isNaN(newVal)) newVal = min;
  newVal = Math.min(max, Math.max(min, newVal));
  el.value = newVal;
  saveNumInput(charId, field, newVal);
}

function formatCp(stored) {
  if (!stored) return '0k';
  const v = stored / 10;
  return (Number.isInteger(v) ? v.toString() : v.toFixed(1)) + 'k';
}

function validateCpInput(input) {
  
  let val = input.value.replace(',', '.').replace(/[^0-9.]/g, '');
  
  const parts = val.split('.');
  if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
  
  if (parts.length === 2 && parts[1].length > 1) val = parts[0] + '.' + parts[1].slice(0,1);
  input.value = val;
}

async function logGrowth(charId) {
  if (currentActor === 'guest') return;
  const char = allChars.find(c => c.id === charId);
  if (!char) return;

  const today = getTodayKST_Calendar();
  const ilvl = char.item_level || 0;
  const cp = char.combat_power || 0;

  
  const { data: existing } = await sb.from('char_growth_log')
    .select('*')
    .eq('character_id', charId)
    .eq('log_date', today)
    .maybeSingle();

  if (existing) {
    
    const newIlvl = Math.max(existing.item_level || 0, ilvl);
    const newCp = Math.max(existing.combat_power || 0, cp);
    
    if (newIlvl === (existing.item_level || 0) && newCp === (existing.combat_power || 0)) return;
    await sb.from('char_growth_log')
      .update({ item_level: newIlvl, combat_power: newCp })
      .eq('id', existing.id);
  } else {
    await sb.from('char_growth_log').insert({
      character_id: charId,
      log_date: today,
      item_level: ilvl,
      combat_power: cp,
    });
  }
}

let _growthState = { charId: null, range: 7, showIlvl: true, showCp: true, data: [] };

async function setupGrowthChart(charId) {
  _growthState.charId = charId;
  _growthState.range = 7;
  _growthState.showIlvl = true;
  _growthState.showCp = true;

  
  document.querySelectorAll('.growth-range-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.growth-range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const r = btn.dataset.range;
      _growthState.range = r === 'all' ? 'all' : parseInt(r);
      renderGrowthChart();
    };
  });
  document.getElementById('gl-ilvl').onchange = (e) => {
    _growthState.showIlvl = e.target.checked;
    renderGrowthChart();
  };
  document.getElementById('gl-cp').onchange = (e) => {
    _growthState.showCp = e.target.checked;
    renderGrowthChart();
  };

  
  const { data, error } = await sb.from('char_growth_log')
    .select('*')
    .eq('character_id', charId)
    .order('log_date', { ascending: true });
  if (error) { console.error(error); return; }
  _growthState.data = data || [];
  renderGrowthChart();
}

function renderGrowthChart() {
  const svg = document.getElementById('growth-chart');
  const emptyEl = document.getElementById('growth-chart-empty');
  if (!svg || !emptyEl) return;


  const todayStr = getTodayKST_Calendar();
  const parseDate = (str) => {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  };
  const todayDate = parseDate(todayStr);

  const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;



  let startDate, endDate;
  if (_growthState.range === 'all') {
    const oldest = _growthState.data[0]?.log_date;
    startDate = oldest ? parseDate(oldest) : todayDate;
    endDate = todayDate;
  } else {
    const rangeDays = _growthState.range;

    const cutoff = new Date(todayDate);
    cutoff.setDate(cutoff.getDate() - (rangeDays - 1));
    const cutoffStr = fmtDate(cutoff);
    const rowsInRange = _growthState.data.filter(r => r.log_date >= cutoffStr);

    if (rowsInRange.length > 0) {
      startDate = parseDate(rowsInRange[0].log_date);
    } else {
      startDate = cutoff;
    }

    endDate = new Date(startDate);
    endDate.setDate(endDate.getDate() + (rangeDays - 1));
  }


  const startStr = fmtDate(startDate);
  const rows = _growthState.data.filter(r => r.log_date >= startStr);

  if (rows.length === 0) {
    svg.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  svg.style.display = 'block';
  emptyEl.style.display = 'none';

  const W = 800, H = 300;
  const padL = 58, padR = 58, padT = 14, padB = 28;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const innerPad = 40;


  const totalDays = Math.max(1, Math.round((endDate - startDate) / 86400000));
  const xScale = (str) => {
    const dt = parseDate(str);
    const days = Math.round((dt - startDate) / 86400000);
    return padL + innerPad + (days / totalDays) * (plotW - innerPad * 2);
  };
  const xByDays = (daysOff) => padL + innerPad + (daysOff / totalDays) * (plotW - innerPad * 2);

  
  const ilvlVals = rows.map(r => r.item_level || 0).filter(v => v > 0);
  const cpVals   = rows.map(r => r.combat_power || 0).filter(v => v > 0);

  function niceTicks(min, max) {
    if (min === max) { min = min * 0.95; max = max * 1.05; }
    const range = max - min;
    const raw = range / 4;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    const step = norm < 1.5 ? mag : norm < 3 ? 2*mag : norm < 7 ? 5*mag : 10*mag;
    const lo = Math.floor(min / step) * step;
    const hi = Math.ceil(max / step) * step;
    const ticks = [];
    for (let v = lo; v <= hi + step * 0.01; v += step) ticks.push(Math.round(v));
    return ticks;
  }

  const ilvlTicks = ilvlVals.length ? niceTicks(Math.min(...ilvlVals), Math.max(...ilvlVals)) : [0, 1];
  const cpTicks   = cpVals.length   ? niceTicks(Math.min(...cpVals),   Math.max(...cpVals))   : [0, 1];

  const ilvlLo = ilvlTicks[0], ilvlHi = ilvlTicks[ilvlTicks.length - 1];
  const cpLo   = cpTicks[0],   cpHi   = cpTicks[cpTicks.length - 1];

  const yIlvl = v => padT + (1 - (v - ilvlLo) / (ilvlHi - ilvlLo || 1)) * plotH;
  const yCp   = v => padT + (1 - (v - cpLo)   / (cpHi   - cpLo   || 1)) * plotH;

  let out = '';

  
  ilvlTicks.forEach(v => {
    const y = yIlvl(v);
    out += `<line class="growth-grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/>`;
  });

  
  if (_growthState.showIlvl && ilvlVals.length) {
    ilvlTicks.forEach(v => {
      const y = yIlvl(v);
      out += `<text class="growth-axis-label" x="${padL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end" fill="#7aa3c8">${v}</text>`;
    });
  }

  
  if (_growthState.showCp && cpVals.length) {
    cpTicks.forEach(v => {
      const y = yCp(v);
      out += `<text class="growth-axis-label" x="${W - padR + 6}" y="${(y + 3).toFixed(1)}" text-anchor="start" fill="#c47a8a">${formatCp(v)}</text>`;
    });
  }

  
  const tickCount = Math.min(7, totalDays + 1);
  for (let i = 0; i < tickCount; i++) {
    const daysOff = Math.round(i * totalDays / (tickCount - 1 || 1));
    const d = new Date(startDate);
    d.setDate(d.getDate() + daysOff);
    const label = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const x = xByDays(daysOff);
    out += `<text class="growth-axis-label" x="${x.toFixed(1)}" y="${H - 10}" text-anchor="middle">${label}</text>`;
  }

  
  if (_growthState.showIlvl && ilvlVals.length) {
    const pts = rows.filter(r => (r.item_level || 0) > 0);
    if (pts.length) {
      out += `<path class="growth-line" d="${pts.map((r,i) => `${i===0?'M':'L'}${xScale(r.log_date).toFixed(1)},${yIlvl(r.item_level).toFixed(1)}`).join(' ')}" stroke="#7aa3c8"/>`;
      pts.forEach(r => {
        out += `<circle class="growth-point" cx="${xScale(r.log_date).toFixed(1)}" cy="${yIlvl(r.item_level).toFixed(1)}" r="3" fill="#7aa3c8" stroke="white"/>`;
      });
    }
  }

  
  if (_growthState.showCp && cpVals.length) {
    const pts = rows.filter(r => (r.combat_power || 0) > 0);
    if (pts.length) {
      out += `<path class="growth-line" d="${pts.map((r,i) => `${i===0?'M':'L'}${xScale(r.log_date).toFixed(1)},${yCp(r.combat_power).toFixed(1)}`).join(' ')}" stroke="#c47a8a"/>`;
      pts.forEach(r => {
        out += `<circle class="growth-point" cx="${xScale(r.log_date).toFixed(1)}" cy="${yCp(r.combat_power).toFixed(1)}" r="3" fill="#c47a8a" stroke="white"/>`;
      });
    }
  }

  svg.innerHTML = out;
}

async function commitCpInput(charId, input) {
  let raw = parseFloat(input.value.replace(',', '.'));
  if (isNaN(raw)) raw = 0;
  
  raw = Math.round(raw * 10) / 10;
  input.value = raw;
  const stored = Math.round(raw * 10); 
  const char = allChars.find(c => c.id === charId);
  if (char) {
    char.combat_power = stored;
    document.getElementById('subbar-char-meta').textContent =
      `템 ${char.item_level||0} · ${formatCp(stored)}`;
  }
  markSelfChange('characters', charId);
  const { error } = await sb.from('characters').update({combat_power: stored}).eq('id', charId);
  if (error) showToast('저장 실패');
  else logGrowth(charId);
}

async function saveNumInput(charId, field, newVal) {
  if (currentActor === 'guest') return;

  const char = allChars.find(c => c.id === charId);
  const prevVal = char ? (char[field] || 0) : 0;
  if (char) char[field] = newVal;
  markSelfChange('characters', charId);
  const { error } = await sb.from('characters').update({[field]: newVal}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }

  
  if (char && field === 'nightmare_base' && newVal !== prevVal) {
    const diff = newVal - prevVal;
    const sign = diff > 0 ? '+' : '';
    writeLog(char.owner, char.name, `악몽 ${sign}${diff} (${prevVal}→${newVal})`, char.id, null);
  }

  lazyRenderOverview();
}

async function updateCharField(charId, field, value) {
  if (currentActor === 'guest') return;

  markSelfChange('characters', charId);
  const { error } = await sb.from('characters').update({[field]: value}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) char[field] = value;
  showToast('저장 완료');
  lazyRenderOverview();
  
  if (field === 'item_level') logGrowth(charId);
}

async function toggleResting(charId, value) {
  if (currentActor === 'guest') return;
  markSelfChange('characters', charId);
  const { error } = await sb.from('characters').update({ resting: value }).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }

    char.resting = value;
    renderDetail(char);
    lazyRenderOverview();
    writeLog(char.owner, char.name, value ? '휴식 시작' : '휴식 해제', char.id, null);

}

async function toggleDaily(charId, field, value, today) {
  if (currentActor === 'guest') return;

  const existing = dailyTasks[charId];
  let error;
  if (existing) {
    markSelfChange('daily_tasks', existing.id);
    ({ error } = await sb.from('daily_tasks').update({[field]: value}).eq('id', existing.id));
    if (!error) existing[field] = value;
  } else {
    const { data, error: err } = await sb.from('daily_tasks')
      .insert({ character_id: charId, task_date: today, [field]: value })
      .select().single();
    error = err;
    if (!error) dailyTasks[charId] = data;
  }
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    renderDetail(char);
    lazyRenderOverview();
    const actionMap = { mission_done:'사명 완료', supply_done:'보급 완료' };
    if (actionMap[field]) {
      if (value) writeLog(char.owner, char.name, actionMap[field], char.id, field);
      else deleteLog(char.id, field);
    }
  }
}

async function cycleAwakening(charId, cur, pip) {
  if (currentActor === 'guest') return;

  const newVal = cur === pip ? pip - 1 : pip;
  markSelfChange('characters', charId);
  const { error } = await sb.from('characters').update({awakening_done: newVal}).eq('id', charId);
  if (error) { showToast('저장 실패'); return; }
  const char = allChars.find(c => c.id === charId);
  if (char) {
    char.awakening_done = newVal;
    renderDetail(char);
    lazyRenderOverview();
    if (newVal > cur) writeLog(char.owner, char.name, `각성 ${newVal}회 완료`, char.id, `awakening_${newVal}`);
    else if (newVal < cur) deleteLog(char.id, `awakening_${cur}`);
  }
}

    <input class="num-val-input" id="${id}" name="${id}" type="number" value="${val}" min="${min}" max="${max}"
      autocomplete="off" data-lpignore="true" data-form-type="other" data-1p-ignore="true"
      onfocus="this.select()"
      oninput="liveAccModal('${owner}','${field}','${id}',${min},${max})">
    <button class="num-btn" onclick="stepAccModal('${owner}','${field}','${id}',1,${min},${max})">+</button>
  </div>`;
}

function stepAccModal(owner, field, inputId, delta, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const newVal = Math.min(max, Math.max(min, (parseInt(el.value)||0) + delta));
  el.value = newVal;
  commitAccModal(owner, field, newVal);
}

function liveAccModal(owner, field, inputId, min, max) {
  const el = document.getElementById(inputId);
  if (!el) return;
  let val = parseInt(el.value);
  if (isNaN(val)) return;
  val = Math.min(max, Math.max(min, val));
  commitAccModal(owner, field, val);
}

function commitAccModal(owner, field, val) {
  const acc = accountData[owner];
  const prevVal = acc ? (acc[field] || 0) : 0;
  if (acc) acc[field] = val;
  
  renderOverview();
  debounce(`acc-${owner}-${field}`, async () => {
    markSelfChange('account_data', owner);
    const { error } = await sb.from('account_data').update({[field]: val}).eq('owner', owner);
    if (error) { showToast('저장 실패'); return; }

    
    const LABELS = {
      shugo_key_base:    '슈고 열쇠',
      dungeon_remaining: '일일던전',
    };
    const label = LABELS[field];
    if (label && val !== prevVal) {
      const diff = val - prevVal;
      const sign = diff > 0 ? '+' : '';
      writeLog(owner, null, `${label} ${sign}${diff} (${prevVal}→${val})`, null, null);
    }
  });
}

const _selfChanges = new Map();
const SELF_ECHO_WINDOW_MS = 3000;  

function markSelfChange(table, id) {
  if (!id) return;
  _selfChanges.set(`${table}:${id}`, Date.now());
  
  for (const [k, t] of _selfChanges) {
    if (Date.now() - t > SELF_ECHO_WINDOW_MS) _selfChanges.delete(k);
  }
}

function isSelfEcho(table, id) {
  if (!id) return false;
  const t = _selfChanges.get(`${table}:${id}`);
  if (!t) return false;
  if (Date.now() - t > SELF_ECHO_WINDOW_MS) {
    _selfChanges.delete(`${table}:${id}`);
    return false;
  }
  return true;
}

async function handleRealtimeChange(table, payload) {
  const eventType = payload.eventType;
  const newRow = payload.new;
  const oldRow = payload.old;
  
  const rowKey = table === 'account_data'
    ? ((newRow && newRow.owner) || (oldRow && oldRow.owner))
    : ((newRow && newRow.id) || (oldRow && oldRow.id));

  if (isSelfEcho(table, rowKey)) return;

  if (eventType === 'UPDATE' && newRow) {
    applyRowUpdate(table, newRow);
    scheduleLocalRerender();
    return;
  }

  
  await reloadTable(table);
}

function applyRowUpdate(table, row) {
  if (table === 'characters') {
    const idx = allChars.findIndex(c => c.id === row.id);
    if (idx >= 0) allChars[idx] = row;
    else allChars.push(row);
  } else if (table === 'account_data') {
    accountData[row.owner] = row;
  } else if (table === 'daily_tasks') {
    dailyTasks[row.character_id] = row;
  } else if (table === 'weekly_tasks') {
    weeklyTasks[row.character_id] = row;
  } else if (table === 'abyss_corridors') {
    const idx = abyssCorridors.findIndex(c => c.id === row.id);
    if (idx >= 0) abyssCorridors[idx] = row;
    else abyssCorridors.push(row);
  } else if (table === 'abyss_clears') {
    abyssClears[`${row.corridor_id}_${row.character_id}`] = row;
  } else if (table === 'expedition_supply') {
    _expChecked.add(row.dungeon_key);
  }
}

let _rerenderTimer = null;
function scheduleLocalRerender() {
  if (_rerenderTimer) return;
  _rerenderTimer = setTimeout(() => {
    _rerenderTimer = null;
    if (document.getElementById('overview').classList.contains('active')) {
      renderOverview();
    } else if (document.getElementById('expedition-page').classList.contains('active')) {
      renderExpeditionPage();
    } else if (currentCharId) {
      const char = allChars.find(c => c.id === currentCharId);
      if (char) renderDetail(char);
    }
  }, 50);
}

async function reloadTable(table) {
  const today = getTodayKST();
  const week = getWeekStart();
  const warDate = getLastWarDate();

  if (table === 'characters') {
    const { data } = await sb.from('characters').select('*').order('owner').order('slot');
    allChars = data || [];
  } else if (table === 'account_data') {
    const { data } = await sb.from('account_data').select('*');
    accountData = {};
    (data||[]).forEach(a => accountData[a.owner] = a);
  } else if (table === 'daily_tasks') {
    const { data } = await sb.from('daily_tasks').select('*').eq('task_date', today);
    dailyTasks = {};
    (data||[]).forEach(t => dailyTasks[t.character_id] = t);
  } else if (table === 'weekly_tasks') {
    const { data } = await sb.from('weekly_tasks').select('*').eq('week_start', week);
    weeklyTasks = {};
    (data||[]).forEach(t => weeklyTasks[t.character_id] = t);
  } else if (table === 'abyss_corridors') {
    const { data } = await sb.from('abyss_corridors').select('*').eq('war_date', warDate);
    abyssCorridors = data || [];
  } else if (table === 'abyss_clears') {
    const { data } = await sb.from('abyss_clears').select('*, abyss_corridors(war_date)');
    abyssClears = {};
    (data||[]).forEach(c => { abyssClears[`${c.corridor_id}_${c.character_id}`] = c; });
  } else if (table === 'expedition_supply') {
    const { data } = await sb.from('expedition_supply').select('dungeon_key');
    const newSet = new Set((data || []).map(r => r.dungeon_key));
    
    _expChecked = newSet;
    for (const k of [..._expPartyTarget]) {
      if (!newSet.has(k)) _expPartyTarget.delete(k);
    }
    
    if (_expPartyTarget.size === 0 && _expChecked.size > 0) {
      _expPartyTarget.add([..._expChecked][0]);
    }
  }

  
  if (document.getElementById('overview').classList.contains('active')) {
    renderOverview();
  } else if (document.getElementById('expedition-page').classList.contains('active')) {
    renderExpeditionPage();
  } else if (currentCharId) {
    const char = allChars.find(c => c.id === currentCharId);
    if (char) renderDetail(char);
  }
}

let logCurrentDate = null;

async function renderLogPage() {
  logCurrentDate = logCurrentDate || getTodayKST();
  const el = document.getElementById('log-content');

  const { data: logs } = await sb.from('activity_log')
    .select('*')
    .eq('game_date', logCurrentDate)
    .order('created_at', { ascending: false });

  const dateLabel = formatLogDate(logCurrentDate);
  const today = getTodayKST();
  const isToday = logCurrentDate === today;

  
  const prev = offsetDate(logCurrentDate, -1);
  const next = offsetDate(logCurrentDate, 1);
  const hasNext = logCurrentDate < today;

  let html = `
    <div class="log-nav">
      <button class="log-nav-btn" onclick="changeLogDate('${prev}')">◀ 전날</button>
      <div class="log-nav-date">${dateLabel}${isToday ? ' <span style="font-size:0.72rem;color:var(--sage)">오늘</span>' : ''}</div>
      <button class="log-nav-btn" onclick="changeLogDate('${next}')" ${hasNext?'':'disabled'}>다음날 ▶</button>
    </div>`;

  if (!logs || logs.length === 0) {
    html += `<div style="text-align:center;padding:40px 0;font-size:0.85rem;color:var(--text-sub)">이 날의 활동 기록이 없어요</div>`;
  } else {
    logs.forEach(log => {
      const time = formatLogTime(log.created_at);
      const actorDisplay = log.actor === '설냥' ? '냥이' : '츄츄';
      const actorClass = log.actor === '설냥' ? 'log-actor-냥이' : 'log-actor-츄츄';
      const ownerClass = log.owner === '설냥' ? 'log-owner-설냥' : 'log-owner-츄츄';
      const delBtn = currentActor === 'guest' ? '' :
        `<button class="log-delete-btn" onclick="openLogDeleteModal('${log.id}')" title="삭제">×</button>`;

      let textHtml;
      
      if (log.field === 'odd_batch' && log.meta && log.meta.type === 'odd_batch') {
        textHtml = `<span class="${actorClass}">[${actorDisplay}]</span>가 <span class="${ownerClass}">[${log.owner}]</span> 계정의 <span class="log-odd-batch-link" onclick="openOddBatchDetailModal('${log.id}')">오드를 일괄 적용했습니다</span>`;
      } else {
        textHtml = `<span class="${actorClass}">[${actorDisplay}]</span>가 <span class="${ownerClass}">[${log.owner}]</span> 계정의 <span class="log-char">[${log.character_name || '계정'}]</span><span class="log-action-done"> ${log.action}</span>`;
      }

      html += `<div class="log-card">
        <div class="log-card-text">${textHtml}</div>
        <div class="log-time">${time}</div>
        ${delBtn}
      </div>`;
    });

}

function offsetDate(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0, 10);
}

function formatLogDate(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date(dateStr + 'T12:00:00Z');
  const m = d.getUTCMonth() + 1;
  const day = d.getUTCDate();
  const wd = days[d.getUTCDay()];
  return `${m}월 ${day}일 (${wd})`;
}

function formatLogTime(isoStr) {
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const mo = kst.getUTCMonth() + 1;
  const day = kst.getUTCDate();
  const h = kst.getUTCHours();
  const m = kst.getUTCMinutes();
  return `${mo}월 ${day}일 ${h}시 ${m}분`;
}

let _oddTimers = {};

function formatKST(isoStr) {
  const d = new Date(isoStr);
  const kst = new Date(d.getTime() + 9*3600*1000);
  const m = kst.getUTCMonth()+1;
  const day = kst.getUTCDate();
  const h = String(kst.getUTCHours()).padStart(2,'0');
  const min = String(kst.getUTCMinutes()).padStart(2,'0');
  return `${m}/${day} ${h}:${min}`;
}

function calcOddEstimate(charId) {
  const char = allChars.find(c => c.id === charId);
  if (!char || !char.odd_recorded_at) return null;

  const recorded = new Date(char.odd_recorded_at);
  const now = new Date();
  const baseVal = char.odd_energy_base || 0;

  
  const chargeHoursKST = [2,5,8,11,14,17,20,23];

  
  const recKST = new Date(recorded.getTime() + 9*3600*1000);
  const nowKST = new Date(now.getTime() + 9*3600*1000);
  const startDay = new Date(Date.UTC(recKST.getUTCFullYear(), recKST.getUTCMonth(), recKST.getUTCDate()));
  const endDay = new Date(Date.UTC(nowKST.getUTCFullYear(), nowKST.getUTCMonth(), nowKST.getUTCDate()));

  let count = 0;
  for (let d = new Date(startDay); d <= endDay; d.setUTCDate(d.getUTCDate() + 1)) {
    for (const h of chargeHoursKST) {
      const chargeUTC = new Date(d.getTime() + (h - 9) * 3600 * 1000);
      if (chargeUTC > recorded && chargeUTC <= now) count++;
    }
  }

  return Math.min(840, baseVal + count * 15);
}

function updateOddEstimateUI(charId) {
  const estimated = calcOddEstimate(charId);
  if (estimated === null) return;
  const el = document.getElementById(`odd-estimate-${charId}`);
  if (el) el.textContent = estimated;
}

function getNextChargeMs() {
  
  
  const now = new Date();
  const kst = new Date(now.getTime() + 9*3600*1000);
  const h = kst.getUTCHours();
  const m = kst.getUTCMinutes();
  const s = kst.getUTCSeconds();
  const ms = kst.getUTCMilliseconds();
  
  const minutesSince5 = ((h - 5 + 24) % 24) * 60 + m;
  const minutesInCycle = minutesSince5 % 180; 
  const minutesLeft = 180 - minutesInCycle;
  return (minutesLeft * 60 - s) * 1000 - ms;
}

function startOddTimer(charId) {
  if (_oddTimers[charId]) clearTimeout(_oddTimers[charId]);
  updateOddEstimateUI(charId);

  function scheduleNext() {
    const delay = getNextChargeMs();
    _oddTimers[charId] = setTimeout(() => {
      updateOddEstimateUI(charId);
      scheduleNext(); 
    }, delay);
  }
  scheduleNext();
}

  e.currentTarget.classList.remove('dragging');

async function dropChar(e, targetOwner, targetSlot) {
  if (currentActor === 'guest') return;

  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

  if (!_dragCharId || _dragOwner !== targetOwner) return; 
  if (_dragSlot === targetSlot) return; 

  
  const targetChar = allChars.find(c => c.owner === targetOwner && c.slot === targetSlot);

  if (targetChar) {
    
    markSelfChange('characters', _dragCharId);
    markSelfChange('characters', targetChar.id);
    await Promise.all([
      sb.from('characters').update({slot: targetSlot}).eq('id', _dragCharId),
      sb.from('characters').update({slot: _dragSlot}).eq('id', targetChar.id),
    ]);
    const dragChar = allChars.find(c => c.id === _dragCharId);
    if (dragChar) dragChar.slot = targetSlot;
    targetChar.slot = _dragSlot;
  } else {
    
    markSelfChange('characters', _dragCharId);
    await sb.from('characters').update({slot: targetSlot}).eq('id', _dragCharId);
    const dragChar = allChars.find(c => c.id === _dragCharId);
    if (dragChar) dragChar.slot = targetSlot;
  }

  _dragCharId = null;
  _dragOwner = null;
  _dragSlot = null;

  renderOverview();
}

async function backupSyncTick() {

  const week = getWeekStart();
  const warDate = getLastWarDate();

      sb.from('account_data').select('*'),
      sb.from('daily_tasks').select('*').eq('task_date', today),
      sb.from('weekly_tasks').select('*').eq('week_start', week),
      sb.from('abyss_corridors').select('*').eq('war_date', warDate),
      sb.from('abyss_clears').select('*'),
    ]);
    if (chars.data) allChars = chars.data;
    if (accs.data) { accountData = {}; accs.data.forEach(a => accountData[a.owner] = a); }
    if (dailies.data) { dailyTasks = {}; dailies.data.forEach(t => dailyTasks[t.character_id] = t); }
    if (weeklies.data) { weeklyTasks = {}; weeklies.data.forEach(t => weeklyTasks[t.character_id] = t); }
    if (corridors.data) abyssCorridors = corridors.data;
    if (clears.data) { abyssClears = {}; clears.data.forEach(c => { abyssClears[`${c.corridor_id}_${c.character_id}`] = c; }); }
    scheduleLocalRerender();
  } catch (e) {
    console.warn('backup sync failed', e);
  }
}
function startBackupSync() {
  if (_backupSyncTimer) return;
  _backupSyncTimer = setInterval(backupSyncTick, 5000);
}
function stopBackupSync() {
  if (_backupSyncTimer) {
    clearInterval(_backupSyncTimer);
    _backupSyncTimer = null;
  }
}

function expKey(name, mode, ilvl) { return `${name}::${mode}::${ilvl}`; }
function expParseKey(key) {
  const [name, mode, ilvlStr] = key.split('::');
  return { name, mode, ilvl: parseInt(ilvlStr) };
}

function expOddLevel(odd) {
  if (odd <= 0)  return 'empty';
  if (odd < 420) return 'low';
  if (odd < 780) return 'mid';
  return 'full';
}
function expOddColor(odd) {
  return { empty:'var(--odd-empty)', low:'var(--odd-low)',
           mid:'var(--odd-mid)', full:'var(--odd-full)' }[expOddLevel(odd)];
}

  const est = (typeof calcOddEstimate === 'function') ? calcOddEstimate(char.id) : null;
  if (est !== null && est !== undefined) return est;
  return char.odd_energy_base || 0;
}

function expRequiredIlvl() {
  if (_expPartyTarget.size === 0) return null;
  let max = 0;
  for (const key of _expPartyTarget) {
    const { ilvl } = expParseKey(key);
    if (ilvl > max) max = ilvl;
  }
  return max;
}

  if (currentActor === 'guest') return;
  const key = expKey(name, mode, ilvl);

    _expChecked.delete(key);

    if (_expPartyTarget.size === 0 && _expChecked.size > 0) {
      _expPartyTarget.add([..._expChecked][0]);

      tableHtml += `
        <div class="exp-supply-cell ${checked ? 'checked' : ''}"
             onclick="expToggleCell('${d.name.replace(/'/g,"\\'")}','${m.key}',${ilvl})">
          ${checked ? '<span class="exp-supply-cell-check">✓</span>' : ''}
          <span class="exp-supply-cell-ilvl">${ilvl}</span>
        </div>
      `;
    });
  });
  tableHtml += `</div>`;

  let selectedSummary = '';
  if (_expChecked.size > 0) {
    const items = [..._expChecked].map(k => {
      const { name, mode, ilvl } = expParseKey(k);
      const modeLabel = { explo: '탐험', normal: '보통', hard: '어려움' }[mode];
      return `<strong>${name}</strong>·${modeLabel} <span style="opacity:0.7">${ilvl}</span>`;
    }).join(' · ');
    selectedSummary = `<div class="exp-supply-selected">오늘 갈 곳: ${items}</div>`;
  }

  const clearBtnHtml = `
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button class="exp-clear-btn" ${_expChecked.size === 0 ? 'disabled' : ''}
              onclick="event.stopPropagation();expClearAll()">모두 해제</button>
    </div>
  `;

  
  let collapsedSummary = '';
  if (!_expSupplyExpanded) {
    if (_expChecked.size === 0) {
      collapsedSummary = `<div class="exp-supply-collapsed-summary">체크된 던전 없음</div>`;
    } else {
      const items = [..._expChecked].map(k => {
        const { name, mode, ilvl } = expParseKey(k);
        const modeLabel = { explo: '탐험', normal: '보통', hard: '어려움' }[mode];
        return `${name}·${modeLabel}`;
      }).join(', ');
      collapsedSummary = `<div class="exp-supply-collapsed-summary">${items}</div>`;
    }
  }

  const titleBadge = _expChecked.size > 0
    ? `<span class="exp-supply-count-badge">${_expChecked.size}</span>`
    : '';

  const supplyCard = `
    <div class="exp-supply-card ${_expSupplyExpanded ? '' : 'collapsed'}">
      <div class="exp-card-title exp-supply-header" onclick="expToggleSupply()">
        <span class="exp-card-icon">📋</span>
        <span>오늘 보급의뢰 던전</span>
        ${titleBadge}
        <span class="exp-supply-chevron ${!_expSupplyExpanded ? 'collapsed' : ''}">▼</span>
      </div>
      ${_expSupplyExpanded ? `
        <div class="exp-card-body">
          ${headerHtml}
          ${tableHtml}
          ${selectedSummary}
          ${clearBtnHtml}
        </div>
      ` : collapsedSummary}
    </div>
  `;

  
  const reqIlvl = expRequiredIlvl();

  const partyPillsHtml = `
    <div class="exp-party-label">파티 구성</div>
    <div class="exp-party-pills">
      <button class="exp-party-pill ${_expParty === 'both' ? 'active' : ''}" onclick="expSetParty('both')"><span class="exp-party-pill-check">✓</span>둘다</button>
      <button class="exp-party-pill ${_expParty === '설냥' ? 'active' : ''}" onclick="expSetParty('설냥')"><span class="exp-party-pill-check">✓</span>설냥혼자</button>
      <button class="exp-party-pill ${_expParty === '츄츄' ? 'active' : ''}" onclick="expSetParty('츄츄')"><span class="exp-party-pill-check">✓</span>츄츄혼자</button>
    </div>
  `;

  
  let targetPillsHtml = '';
  if (_expChecked.size > 0) {
    const checkedList = [..._expChecked].map(k => {
      const { name, mode, ilvl } = expParseKey(k);
      const modeLabel = { explo: '탐험', normal: '보통', hard: '어려움' }[mode];
      const modeDotCls = { explo: 'explo', normal: 'normal', hard: 'hard' }[mode];
      return { key: k, name, mode, ilvl, modeLabel, modeDotCls };
    });
    targetPillsHtml = `
      <div class="exp-party-label">어느 던전으로 파티 찾기? <span style="opacity:0.6;font-size:0.66rem">· 하나 탭하세요</span></div>
      <div class="exp-party-pills">
        ${checkedList.map(t => `
          <button class="exp-target-pill ${_expPartyTarget.has(t.key) ? 'active' : ''}"
                  onclick="expTogglePartyTarget('${t.key}')">
            <span class="exp-target-pill-check">✓</span>
            <span class="exp-target-pill-dot ${t.modeDotCls}"></span>
            ${t.name} <span class="exp-target-pill-mode">${t.modeLabel} ${t.ilvl}</span>
          </button>
        `).join('')}
      </div>
    `;
  }

  let partyBodyHtml;
  if (_expChecked.size === 0) {
    partyBodyHtml = `
      <div class="exp-party-empty-hint">위에서 오늘 갈 던전을 먼저 체크해 주세요</div>
    `;
  } else if (reqIlvl === null) {
    partyBodyHtml = `
      ${targetPillsHtml}
      ${partyPillsHtml}
      <div class="exp-party-empty-hint">위 던전 중 하나를 골라주세요</div>
    `;
  } else {
    
    const pool = allChars.filter(c => c.name && (c.item_level || 0) >= reqIlvl);

    const sortFn = _expSortMode === 'cp'
      ? (a, b) => {
          const diff = (b.combat_power || 0) - (a.combat_power || 0);
          return diff !== 0 ? diff : expCurrentOdd(b) - expCurrentOdd(a);
        }
      : (a, b) => {
          const diff = expCurrentOdd(b) - expCurrentOdd(a);
          return diff !== 0 ? diff : (b.combat_power || 0) - (a.combat_power || 0);
        };

    const sortPillsHtml = `
      <div class="exp-party-label">정렬 기준</div>
      <div class="exp-party-pills">
        <button class="exp-party-pill ${_expSortMode === 'odd' ? 'active' : ''}" onclick="expSetSortMode('odd')">
          <span class="exp-party-pill-check">✓</span>오드 많은 순
        </button>
        <button class="exp-party-pill ${_expSortMode === 'cp' ? 'active' : ''}" onclick="expSetSortMode('cp')">
          <span class="exp-party-pill-check">✓</span>전투력 높은 순
        </button>
      </div>
    `;

    const reqInfo = (() => {
      const targets = [..._expPartyTarget].map(k => {
        const { name, mode, ilvl } = expParseKey(k);
        const modeLabel = { explo: '탐험', normal: '보통', hard: '어려움' }[mode];
        return `${name} · ${modeLabel} ${ilvl}`;
      }).join(' + ');
      return `
        <div class="exp-party-req">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0"><strong>${targets}</strong></span>
          <span style="flex-shrink:0">필요 템 <strong>${reqIlvl}</strong>+</span>
        </div>
      `;
    })();

    if (pool.length === 0) {
      partyBodyHtml = `
        ${reqInfo}
        ${targetPillsHtml}
        ${partyPillsHtml}
        ${sortPillsHtml}
        <div class="exp-party-empty-hint">조건에 맞는 캐릭터가 없어요 🥲</div>
      `;
    } else {
      let resultArea;
      if (_expParty === 'both') {
        
        const seolList = pool.filter(c => c.owner === '설냥').sort(sortFn);
        const chuList  = pool.filter(c => c.owner === '츄츄').sort(sortFn);
        const topSeol = seolList.find(c => !_expExcluded.has(c.id)) || null;
        const topChu  = chuList.find(c => !_expExcluded.has(c.id)) || null;

        const hasCandidates = (seolList.length > 1) || (chuList.length > 1);

        resultArea = `
          <div class="exp-recommend-title">
            <span class="exp-recommend-medal">🥇</span>추천 파티 (오드 많은 순)
          </div>
          <div class="exp-recommend-row">
            ${expRecommendCard(topSeol, '설냥')}
            <div class="exp-recommend-plus">+</div>
            ${expRecommendCard(topChu, '츄츄')}
          </div>
          ${hasCandidates ? `
            <div class="exp-result-toggle" onclick="expToggleResults()">
              <div class="exp-result-toggle-label">
                <span>다른 후보</span>
                <span class="exp-count-badge-ok">설냥 ${seolList.length} · 츄츄 ${chuList.length}</span>
                ${_expExcluded.size > 0 ? `<span class="exp-count-badge-excl">제외 ${_expExcluded.size}</span>` : ''}
              </div>
              <span class="exp-result-chevron ${!_expResultExpanded ? 'collapsed' : ''}">▼</span>
            </div>
            <div class="exp-result-wrap ${!_expResultExpanded ? 'collapsed' : ''}">
              <div class="exp-candidates-grid">
                <div class="exp-candidates-col">
                  <div class="exp-candidates-col-title">
                    <span class="exp-candidates-col-dot" style="background:var(--owner-설냥)"></span>설냥 · ${seolList.length}명
                  </div>
                  ${seolList.length === 0
                    ? `<div class="exp-candidates-col-empty">없음</div>`
                    : seolList.map((c, i) => expCandidateItem(c, i, topSeol)).join('')}
                </div>
                <div class="exp-candidates-col">
                  <div class="exp-candidates-col-title">
                    <span class="exp-candidates-col-dot" style="background:var(--owner-츄츄)"></span>츄츄 · ${chuList.length}명
                  </div>
                  ${chuList.length === 0
                    ? `<div class="exp-candidates-col-empty">없음</div>`
                    : chuList.map((c, i) => expCandidateItem(c, i, topChu)).join('')}
                </div>
              </div>
            </div>
          ` : ''}
        `;
      } else {
        
        const soloList = pool.filter(c => c.owner === _expParty).sort(sortFn);
        const top = soloList.find(c => !_expExcluded.has(c.id)) || null;

        if (soloList.length === 0) {
          resultArea = `<div class="exp-party-empty-hint">${_expParty} 계정에 조건 맞는 캐릭이 없어요</div>`;
        } else {
          resultArea = `
            <div class="exp-recommend-title">
              <span class="exp-recommend-medal">🥇</span>추천 캐릭 (${_expParty})
            </div>
            <div class="exp-recommend-solo">
              ${expRecommendCard(top, _expParty)}
            </div>
            ${soloList.length > 1 ? `
              <div class="exp-result-toggle" onclick="expToggleResults()">
                <div class="exp-result-toggle-label">
                  <span>다른 후보</span>
                  <span class="exp-count-badge-ok">${soloList.length}명</span>
                  ${_expExcluded.size > 0 ? `<span class="exp-count-badge-excl">제외 ${_expExcluded.size}</span>` : ''}
                </div>
                <span class="exp-result-chevron ${!_expResultExpanded ? 'collapsed' : ''}">▼</span>
              </div>
              <div class="exp-result-wrap ${!_expResultExpanded ? 'collapsed' : ''}">
                <div class="exp-candidates-col" style="max-width:60%;margin-top:6px">
                  ${soloList.map((c, i) => expCandidateItem(c, i, top)).join('')}
                </div>
              </div>
            ` : ''}
          `;
        }
      }

      partyBodyHtml = `
        ${reqInfo}
        ${targetPillsHtml}
        ${partyPillsHtml}
        ${sortPillsHtml}
        ${resultArea}
      `;
    }
  }

  const partyCard = `
    <div class="exp-party-card">
      <div class="exp-card-title">
        <span class="exp-card-icon sage">🎯</span>오늘 던전 찾기
      </div>
      <div class="exp-card-body">
        ${partyBodyHtml}
      </div>
    </div>
  `;

  
  const legend = `
    <div class="exp-legend">
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--odd-empty)"></div>오드 0</div>
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--odd-low)"></div>낮음</div>
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--odd-mid)"></div>중간</div>
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--odd-full)"></div>가득 (빨리 써요)</div>
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--owner-설냥);border-radius:50%"></div>설냥</div>
      <div class="exp-legend-item"><div class="exp-legend-dot" style="background:var(--owner-츄츄);border-radius:50%"></div>츄츄</div>
    </div>
  `;

  el.innerHTML = supplyCard + partyCard + legend;
}

function expRecommendCard(c, ownerLabel) {
  if (!c) {
    return `<div class="exp-recommend-card empty">
      ${ownerLabel} 가능 캐릭 없음
    </div>`;
  }
  const odd = expCurrentOdd(c);
  const pct = Math.min(100, (odd / 840) * 100);
  const cp = c.combat_power || 0;
  const cpText = (typeof formatCp === 'function') ? formatCp(cp) : cp;
  return `
    <div class="exp-recommend-card">
      <div class="exp-recommend-card-strip" style="background:var(--owner-${c.owner})"></div>
      <div class="exp-recommend-card-owner">
        <span class="exp-recommend-card-owner-dot" style="background:var(--owner-${c.owner})"></span>${c.owner}
      </div>
      <div class="exp-recommend-card-name">${c.name}</div>
      <div class="exp-recommend-card-stats">템 ${c.item_level||0} · ${cpText}</div>
      <div class="exp-recommend-card-bar">
        <div class="exp-recommend-card-bar-fill" style="width:${pct}%;background:${expOddColor(odd)}"></div>
      </div>
      <div class="exp-recommend-card-odd">
        <span>오드</span>
        <span><strong>${odd}</strong> / 840</span>
      </div>
    </div>
  `;
}

function expCandidateItem(c, idx, topChar) {
  const excluded = _expExcluded.has(c.id);
  const isTop = !excluded && topChar && c.id === topChar.id;
  const odd = expCurrentOdd(c);
  const pct = Math.min(100, (odd / 840) * 100);
  const cp = c.combat_power || 0;
  const cpText = (typeof formatCp === 'function') ? formatCp(cp) : cp;
  return `
    <div class="exp-candidate-item ${excluded ? 'excluded' : ''} ${isTop ? 'top' : ''}">
      <div class="exp-candidate-rank">${idx + 1}</div>
      <div class="exp-candidate-name">${c.name}</div>
      <div class="exp-candidate-cp">${cpText}</div>
      <div class="exp-candidate-bar">
        <div class="exp-candidate-bar-fill" style="width:${pct}%;background:${expOddColor(odd)}"></div>
      </div>
      <div class="exp-candidate-odd">${odd}</div>
      <button class="exp-candidate-exclude-btn ${excluded ? 'excluded' : ''}"
              onclick="expToggleExclude('${c.id}')"
              title="${excluded ? '다시 추가' : '추천에서 제외'}">
        ${excluded ? '+' : '×'}
      </button>
    </div>
  `;
}
</script>

<button id="vsw-badge" onclick="vswOpen()">v1.2</button>

<div id="vsw-overlay" onclick="vswClose()">
  <div class="vsw-card" onclick="event.stopPropagation()">
    <div class="vsw-title">버전 전환</div>
    <div class="vsw-sub">다른 버전으로 이동하려면 비밀번호 입력</div>
    <div class="vsw-pin-row">
      <input id="vsw-pin-input" class="vsw-pin" type="text" inputmode="numeric" maxlength="8"
        autocomplete="off" data-lpignore="true" data-form-type="other" data-1p-ignore="true"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter') vswCheckPin()">
      <button class="vsw-btn primary" onclick="vswCheckPin()">확인</button>
    </div>
    <div id="vsw-err" class="vsw-err"></div>
    <div id="vsw-list" class="vsw-list"></div>
    <div class="vsw-btns">
      <button class="vsw-btn" onclick="vswClose()">닫기</button>
    </div>
  </div>
</div>

<script>
(function() {
  const CURRENT_VERSION = 'v1.2';
  const VERSIONS_URL = '/aion_task/versions.json';

  function openModal() {
    document.getElementById('vsw-err').textContent = '';
    document.getElementById('vsw-pin-input').value = '';
    document.getElementById('vsw-list').style.display = 'none';
    document.getElementById('vsw-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('vsw-pin-input').focus(), 100);
  }
  function closeModal() {
    document.getElementById('vsw-overlay').style.display = 'none';
  }

  async function checkPin() {
    const input = document.getElementById('vsw-pin-input').value.trim();
    const errEl = document.getElementById('vsw-err');
    if (input.length !== 8) { errEl.textContent = '8자리를 입력해주세요'; return; }
    try {
      const { data, error } = await sb.from('app_config').select('value').eq('key', 'version_pin').single();
      if (error || !data) { errEl.textContent = '설정을 불러올 수 없어요'; return; }
      if (input !== data.value) {
        errEl.textContent = '비밀번호가 틀려요';
        document.getElementById('vsw-pin-input').value = '';
        return;
      }
      errEl.textContent = '';
      await renderList();
    } catch (e) {
      console.error(e);
      errEl.textContent = '확인 실패';
    }
  }

  async function renderList() {
    const listEl = document.getElementById('vsw-list');
    listEl.innerHTML = '<div style="text-align:center;font-size:0.75rem;color:var(--text-sub);padding:12px">목록 불러오는 중...</div>';
    listEl.style.display = 'flex';
    try {
      const res = await fetch(VERSIONS_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const versions = await res.json();
      listEl.innerHTML = versions.map(v => {
        const isCurrent = v.id === CURRENT_VERSION;
        const cls = 'vsw-item' + (isCurrent ? ' current' : '');
        const handler = isCurrent ? '' : `onclick="location.href='${v.file}'"`;
        const badge = isCurrent ? '<span style="font-size:0.68rem;color:var(--sage)">(현재)</span>' : '';
        return `
          <div class="${cls}" ${handler}>
            <div class="vsw-item-head"><span>${v.id} ${badge}</span><span class="vsw-item-date">${v.date || ''}</span></div>
            <div class="vsw-item-desc">${(v.desc || '').replace(/</g,'&lt;')}</div>
          </div>
        `;
      }).join('');
    } catch (e) {
      listEl.innerHTML = '<div style="text-align:center;font-size:0.75rem;color:#b85050;padding:12px">버전 목록을 불러올 수 없어요</div>';
    }
  }

  window.vswOpen = openModal;
  window.vswClose = closeModal;
  window.vswCheckPin = checkPin;
})();
</script>

</body>
</html>
